---
- name: bootstrap all hosts
  import_playbook: bootstrap.yml

- name: Reset connections after bootstrap
  hosts: all:!truenas:!unifi
  gather_facts: false
  tasks:
    - name: Reset SSH connection
      ansible.builtin.meta: reset_connection

    - name: Wait for SSH to be ready as ansible user
      ansible.builtin.wait_for_connection:
        timeout: 30
        sleep: 2

- name: initial setup
  hosts: all
  tasks:
    - name: linux/macos find current user home directory
      ansible.builtin.set_fact:
        my_home: "{{ lookup('env', 'HOME') }}"
    - name: gather facts
      ansible.builtin.setup:
        gather_subset:
          - distribution_release
          - processor
          - os_family

# Base configuration shared by standard servers that connect as `ansible` with
# privilege escalation. Runs before the per-service plays so each of those only
# carries its own roles. Deliberately excludes: proxmox (custom role order),
# tailscale (apt-source cleanup must precede package installs), claude_code
# (connects as a human user, no become), truenas/unifi (API/local connection).
- name: base configuration for standard servers
  hosts: lxc:kaz:barlo:!claude_code:!tailscale
  become: true
  roles:
    - role: ansible_user
    - role: packages
    - role: geerlingguy.security

- name: setup proxmox hosts
  hosts: proxmox
  become: true
  roles:
    - role: proxmox
    - role: packages
    - role: geerlingguy.security
    - role: users
    - role: artis3n.tailscale.machine
      when: not ansible_check_mode
    - role: install_script
    - role: ax88179b
      when: ax88179b_enabled | default(false)
      tags: [ax88179b]
    - role: r8152
      tags: [r8152]
    - role: ansible_user

- name: configure truenas
  hosts: truenas
  tasks:
    - name: Configure TrueNAS (skipped in check mode — REST API calls require live execution)
      ansible.builtin.include_role:
        name: truenas
      when: not ansible_check_mode

- name: setup tailscale server
  hosts: tailscale
  become: true
  pre_tasks:
    - name: Remove legacy Tailscale apt source (conflicts with DEB822 tailscale.sources)
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/pkgs_tailscale_com_stable_ubuntu.list
        state: absent
  roles:
    - role: ansible_user
    - role: geerlingguy.ntp
    - role: geerlingguy.security
    - role: packages
    - role: artis3n.tailscale.machine
      when: not ansible_check_mode
    - role: users

  tasks:
    - name: Install iptables-persistent
      ansible.builtin.apt:
        name: iptables-persistent
        state: present

    - name: Enable IP forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: 1
        state: present
        sysctl_set: true

    - name: Allow IP masquerading
      ansible.builtin.iptables:
        table: nat
        chain: POSTROUTING
        jump: MASQUERADE
      notify: Save iptables rules

  handlers:
    - name: Save iptables rules
      ansible.builtin.command: netfilter-persistent save
      changed_when: true

- name: setup docker server
  hosts: kaz
  become: true
  pre_tasks:
    - name: Install qemu-guest-agent
      ansible.builtin.package:
        name: qemu-guest-agent
        state: present
    - name: Enable and start qemu-guest-agent
      ansible.builtin.service:
        name: qemu-guest-agent
        state: started
        enabled: true
  roles:
    - role: users
    - role: geerlingguy.ntp
    - role: geerlingguy.docker
    - role: artis3n.tailscale.machine
      when: not ansible_check_mode
    - role: watchtower
    - role: glance
    - role: n8n
    - role: freshrss
    - role: cloudflare_ddns
    - role: dozzle_hub
      tags: [dozzle]

- name: Deploy Beszel monitoring
  import_playbook: beszel.yml

- name: setup plex server
  hosts: plex
  become: true
  roles:
    - role: users
    - role: geerlingguy.ntp
    - role: plex

- name: setup arr stack
  hosts: arr
  become: true
  roles:
    - role: arr

- name: deploy dozzle agents
  hosts: dozzle_agents
  become: true
  tags: [dozzle]
  roles:
    - role: dozzle_agent

- name: setup pi-hole server
  hosts: pi-hole
  become: true
  roles:
    - role: geerlingguy.ntp
    - role: users
    - role: pi-hole
    - role: acme

- name: setup caddy reverse proxy
  hosts: caddy
  become: true
  roles:
    - role: geerlingguy.ntp
    - role: users
    - role: caddy

- name: setup uptime-kuma server
  hosts: uptime-kuma
  become: true
  roles:
    - role: uptime_kuma

- name: Configure claude-code LXC
  hosts: claude_code
  gather_facts: true
  roles:
    - role: ansible_user
    - role: packages
    - role: geerlingguy.security
    - role: claude-code

- name: setup minecraft server
  hosts: minecraft
  become: true
  roles:
    - role: users
    - role: geerlingguy.ntp
    - role: minecraft

- name: setup barlo remote site server
  hosts: barlo
  become: true
  roles:
    - role: users
    - role: geerlingguy.ntp
    - role: artis3n.tailscale.machine
      when: not ansible_check_mode
    - role: desktop
    - role: uptime_kuma

- name: configure unifi
  hosts: unifi
  connection: local
  gather_facts: false
  roles:
    - role: unifi
