---
- name: bootstrap all hosts
  import_playbook: bootstrap.yml

- name: initial setup
  hosts: all
  tasks:
    - name: linux/macos find current user home directory
      ansible.builtin.set_fact:
        my_home: "{{ lookup('env', 'HOME') }}"

- name: setup proxmox hosts
  hosts: proxmox
  become: true
  roles:
    - role: proxmox
    - role: GROG.package
    - role: users
    - role: artis3n.tailscale.machine
      when: not ansible_check_mode
    - role: install_script
    - role: ax88179b
      when: ax88179b_enabled | default(false)
      tags: [ax88179b]
    - role: r8152
      tags: [r8152]
    - role: ansible_user

- name: configure truenas
  hosts: truenas
  tasks:
    - name: Configure TrueNAS (skipped in check mode — REST API calls require live execution)
      ansible.builtin.include_role:
        name: truenas
      when: not ansible_check_mode

- name: setup tailscale server
  hosts: tailscale
  become: true
  roles:
    - role: ansible_user
    - role: geerlingguy.ntp
    - role: geerlingguy.security
    - role: GROG.package
    - role: artis3n.tailscale.machine
      when: not ansible_check_mode
    - role: users

  tasks:
    - name: Install iptables-persistent
      ansible.builtin.apt:
        name: iptables-persistent
        state: present

    - name: Enable IP forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: 1
        state: present
        sysctl_set: true

    - name: Allow IP masquerading
      ansible.builtin.iptables:
        table: nat
        chain: POSTROUTING
        jump: MASQUERADE
      notify: Save iptables rules

  handlers:
    - name: Save iptables rules
      ansible.builtin.command: netfilter-persistent save
      changed_when: true

- name: setup docker server
  hosts: kaz
  become: true
  roles:
    - role: ansible_user
    - role: GROG.package
    - role: users
    - role: weareinteractive.environment
    - role: geerlingguy.ntp
    - role: geerlingguy.security
    - role: geerlingguy.docker
    - role: geerlingguy.pip
    - role: shelleg.ansible_role_portainer

- name: setup plex server
  hosts: plex
  become: true
  roles:
    - role: ansible_user
    - role: GROG.package
    - role: users
    - role: geerlingguy.ntp
    - role: geerlingguy.security
    - role: plex

- name: setup glance server
  hosts: glance
  become: true
  roles:
    - role: ansible_user
    - role: GROG.package
    - role: geerlingguy.ntp
    - role: geerlingguy.security
    - role: artis3n.tailscale.machine
      when: not ansible_check_mode
    - role: users
    - role: glance

- name: setup netdata parent
  hosts: netdata
  become: true
  roles:
    - role: ansible_user
    - role: GROG.package
    - role: users
    - role: netdata

- name: setup arr stack
  hosts: arr
  become: true
  roles:
    - role: ansible_user
    - role: GROG.package
    - role: arr

- name: setup netdata agents on proxmox nodes
  hosts: proxmox
  become: true
  roles:
    - role: netdata

- name: setup pi-hole server
  hosts: pi-hole
  become: true
  roles:
    - role: ansible_user
    - role: GROG.package
    - role: geerlingguy.ntp
    - role: geerlingguy.security
    - role: users
    - role: pi-hole
    - role: acme

- name: setup uptime-kuma server
  hosts: uptime-kuma
  become: true
  roles:
    - role: ansible_user
    - role: GROG.package
    - role: uptime_kuma

- name: setup xps laptop (local LLM host)
  hosts: drizzt
  become: true
  roles:
    - role: ansible_user
    - role: ollama
