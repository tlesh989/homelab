---
- name: bootstrap all hosts
  import_playbook: bootstrap.yml

- name: initial setup
  hosts: all
  tasks:
    - name: linux/macos find current user home directory
      ansible.builtin.set_fact:
        my_home: "{{ lookup('env', 'HOME') }}"
    - name: gather facts
      ansible.builtin.setup:
        gather_subset:
          - distribution_release
          - processor
          - os_family

- name: setup proxmox hosts
  hosts: proxmox
  become: true
  roles:
    - role: proxmox
    - role: packages
    - role: users
    - role: artis3n.tailscale.machine
      when: not ansible_check_mode
    - role: install_script
    - role: ax88179b
      when: ax88179b_enabled | default(false)
      tags: [ax88179b]
    - role: r8152
      tags: [r8152]
    - role: ansible_user

- name: configure truenas
  hosts: truenas
  tasks:
    - name: Configure TrueNAS (skipped in check mode — REST API calls require live execution)
      ansible.builtin.include_role:
        name: truenas
      when: not ansible_check_mode

- name: setup tailscale server
  hosts: tailscale
  become: true
  pre_tasks:
    - name: Remove legacy Tailscale apt source (conflicts with DEB822 tailscale.sources)
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/pkgs_tailscale_com_stable_ubuntu.list
        state: absent
  roles:
    - role: ansible_user
    - role: geerlingguy.ntp
    - role: geerlingguy.security
    - role: packages
    - role: artis3n.tailscale.machine
      when: not ansible_check_mode
    - role: users

  tasks:
    - name: Install iptables-persistent
      ansible.builtin.apt:
        name: iptables-persistent
        state: present

    - name: Enable IP forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: 1
        state: present
        sysctl_set: true

    - name: Allow IP masquerading
      ansible.builtin.iptables:
        table: nat
        chain: POSTROUTING
        jump: MASQUERADE
      notify: Save iptables rules

  handlers:
    - name: Save iptables rules
      ansible.builtin.command: netfilter-persistent save
      changed_when: true

- name: setup docker server
  hosts: kaz
  become: true
  pre_tasks:
    - name: Install qemu-guest-agent
      ansible.builtin.package:
        name: qemu-guest-agent
        state: present
    - name: Enable and start qemu-guest-agent
      ansible.builtin.service:
        name: qemu-guest-agent
        state: started
        enabled: true
  roles:
    - role: ansible_user
    - role: packages
    - role: users
    - role: geerlingguy.ntp
    - role: geerlingguy.security
    - role: geerlingguy.docker
    - role: artis3n.tailscale.machine
      when: not ansible_check_mode
    - role: watchtower
    - role: glance
    - role: n8n
    - role: cloudflare_ddns

- name: deploy monitoring stack
  hosts: monitoring
  gather_facts: true
  become: true
  roles:
    - role: monitoring

- name: setup plex server
  hosts: plex
  become: true
  roles:
    - role: ansible_user
    - role: packages
    - role: users
    - role: geerlingguy.ntp
    - role: geerlingguy.security
    - role: plex

- name: setup netdata parent
  hosts: netdata
  become: true
  roles:
    - role: ansible_user
    - role: packages
    - role: users
    - role: netdata

- name: setup arr stack
  hosts: arr
  become: true
  roles:
    - role: ansible_user
    - role: packages
    - role: arr

- name: deploy scraparr metrics exporter
  hosts: arr
  gather_facts: true
  become: true
  roles:
    - role: scraparr

- name: setup netdata agents on proxmox nodes
  hosts: proxmox
  become: true
  roles:
    - role: netdata

- name: setup pi-hole server
  hosts: pi-hole
  become: true
  roles:
    - role: ansible_user
    - role: packages
    - role: geerlingguy.ntp
    - role: geerlingguy.security
    - role: users
    - role: pi-hole
    - role: acme

- name: setup caddy reverse proxy
  hosts: caddy
  become: true
  roles:
    - role: ansible_user
    - role: packages
    - role: geerlingguy.ntp
    - role: geerlingguy.security
    - role: users
    - role: caddy

- name: setup uptime-kuma server
  hosts: uptime-kuma
  become: true
  roles:
    - role: ansible_user
    - role: packages
    - role: uptime_kuma

- name: setup minecraft server
  hosts: minecraft
  become: true
  roles:
    - role: ansible_user
    - role: packages
    - role: users
    - role: geerlingguy.ntp
    - role: geerlingguy.security
    - role: minecraft

- name: configure unifi
  hosts: unifi
  connection: local
  gather_facts: false
  roles:
    - role: unifi

- name: deploy node exporter to all hosts
  hosts: exporters
  gather_facts: true
  become: true
  roles:
    - role: node_exporter
