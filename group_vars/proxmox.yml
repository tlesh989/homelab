---
# grog.package
package_list:
  - name: curl
  - name: git
  - name: htop
  - name: iftop
  - name: iotop
  - name: iperf3
  - name: jq
  - name: libguestfs-tools
  - name: lm-sensors
  - name: mc
  - name: ncdu
  - name: net-tools
  - name: nmap
  - name: openssh-server
  - name: python3
  - name: qemu-guest-agent
    state: absent
  - name: screen
  - name: smartmontools
  - name: sudo
  - name: tmux
  - name: tree
  - name: wget

# artis3n.tailscale
tailscale_authkey: "{{ lookup('env', 'TAILSCALE_KEY') }}"

# install_script
install_script_src: proxmox_tailscale_ssl.sh
install_script_dest: /root/tailscale_ssl.sh
install_script_cron_name: "renew tailscale ssl certificates"
install_script_cron_weekday: "1"
install_script_cron_job: "{{ install_script_dest }}"
install_script_cron_enabled: true

# proxmox
proxmox_ceph_disabled: true
proxmox_disable_ha: false
# Storage network MTU. Default 9000 (jumbo) for hosts with stable internal NICs
# (sturm). Nodes with USB NICs that can't reliably do jumbo override this to 1500
# in their own group_vars (bupu, tika). Mixed MTU is safe here: storage is TCP
# (per-connection MSS negotiation) and node-to-node traffic runs on the mgmt net.
proxmox_storage_mtu: 9000

# Proxmox clustering REQUIRES key-based root SSH between nodes (live migration,
# pvecm, HA). group_vars/all.yml sets this to "no", which breaks inter-node SSH.
# Override to prohibit-password (key-only root, no password auth) for PVE nodes.
security_ssh_permit_root_login: "prohibit-password"

# Shared iSCSI storage variables (mirrors truenas role defaults)
truenas_iscsi_portal_ip: "192.168.220.6"
truenas_iscsi_target_name: "proxmox"
truenas_lvm_vg_name: "pve-iscsi"

# proxmox-nfs storage: enforce hard mount opts (was soft,timeo=30 on tika/bupu —
# unsafe for VM-image/backup storage). terraform/storage.tf can't manage `options`
# (provider bug, ignore_changes), so it's enforced here. See homelab-1it.
# NOTE: changing this only updates storage.cfg; existing mounts must be remounted
# per node (deactivate/reactivate or reboot) during a window to take effect.
proxmox_nfs_storage_id: "proxmox-nfs"
proxmox_nfs_storage_options: "hard,timeo=600"

# iSCSI CHAP on the initiator side (homelab-1it). Default OFF — see runbook in
# roles/truenas/tasks/iscsi_chap.yml. Configure initiators BEFORE flipping the
# TrueNAS target to CHAP.
proxmox_iscsi_chap_enabled: false
proxmox_iscsi_chap_user: "{{ lookup('env', 'TRUENAS_ISCSI_CHAP_USER') | default('', true) }}"
proxmox_iscsi_chap_secret: "{{ lookup('env', 'TRUENAS_ISCSI_CHAP_SECRET') | default('', true) }}"
