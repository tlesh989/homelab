---
# NFS mount for media library
arr_nfs_server: 192.168.220.6
arr_nfs_export: /mnt/wayreth/data/media
arr_media_path: /data/media

# Timezone — update to match your local timezone
arr_timezone: America/Detroit

# Pushover notifications (for Watchtower)
arr_pushover_api_token: "{{ lookup('env', 'PUSHOVER_API_TOKEN') }}"
arr_pushover_user_key: "{{ lookup('env', 'PUSHOVER_USER_KEY') }}"
