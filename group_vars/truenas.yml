truenas_nfs_shares:
  - dataset: "wayreth/data/media"
    comment: "Plex media library"
    hosts:
      - "192.168.233.7"   # tika
      - "192.168.233.8"   # bupu
      - "192.168.233.9"   # sturm
    maproot_user: "root"
    maproot_group: "wheel"
