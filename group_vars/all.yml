---
ansible_python_interpreter: auto_silent
ansible_user: ansible
ansible_ssh_private_key_file: ~/.ssh/ansible_ed25519

# users role
users_list:
  - username: "{{ lookup('env', 'SSH_USER') }}"
    password: "{{ lookup('env', 'SSH_USER_PASS') | password_hash('sha512', 65534 | random(seed=inventory_hostname) | string) }}"
    shell: /bin/bash
    users_group: "{{ lookup('env', 'SSH_USER') }}"
    authorized_keys:
      - "{{ lookup('env', 'SSH_PUBLIC_KEY') }}"

# grog.package
package_list:
  - name: curl
  - name: git
  - name: htop
  - name: iftop
  - name: iotop
  - name: lm-sensors
  - name: mc
  - name: ncdu
  - name: net-tools
  - name: nmap
  - name: openssh-server
  - name: python
  - name: qemu-guest-agent
  - name: screen
  - name: smartmontools
  - name: sudo
  - name: tmux
  - name: tree
  - name: wget

# geerlingguy.ntp
ntp_timezone: "America/Detroit"

# geerlingguy.security
security_ssh_port: 22
security_ssh_password_authentication: "no"
security_ssh_permit_root_login: "no"
security_ssh_usedns: "no"
security_autoupdate_enabled: true
security_fail2ban_enabled: false
security_sudoers_passwordless:
  - "{{ lookup('env', 'SSH_USER') }}"
