name: CI Source of Truth

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    name: Validate and Protect
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint pre-commit

      - name: Install Task
        uses: go-task/setup-task@v1
        with:
          version: 3.x

      - name: Ansible Syntax Check
        run: task syntax

      - name: Terraform Validate
        run: terraform -chdir=terraform init -backend=false && terraform -chdir=terraform validate

      - name: Enforce Ansible Vault Protection
        run: pre-commit run check-ansible-vault --all-files
