---
name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Job to detect which files changed
  changes:
    permissions:
      contents: read
      pull-requests: read  # required by dorny/paths-filter on pull_request events
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      ansible: ${{ steps.filter.outputs.ansible }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - '.github/workflows/ci.yml'
            ansible:
              - 'main.yml'
              - 'roles/**'
              - 'requirements.yml'
              - 'group_vars/**'
              - 'hosts'
              - 'ansible.cfg'
              - 'Taskfile.yml'
              - '.github/workflows/ci.yml'

  validate-terraform:
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Create Terraform plugin cache directory
        run: mkdir -p ~/.terraform.d/plugin-cache

      - name: Cache Terraform providers
        uses: actions/cache@v5
        with:
          path: ~/.terraform.d/plugin-cache
          key: >-
            ${{ runner.os }}-terraform-providers-
            ${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-providers-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          cli_config_credentials_token: ${{ secrets.TF_TOKEN }} # doppler github sync
          terraform_wrapper: false
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

      - name: Terraform Validate
        working-directory: ./terraform
        run: task ci

  validate-ansible:
    needs: changes
    if: needs.changes.outputs.ansible == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Ansible and Lint
        run: |
          pip install -r requirements.txt

      - name: Cache Ansible Galaxy Roles/Collections
        uses: actions/cache@v5
        with:
          path: |
            galaxy_roles
            galaxy_collections
            collections
          key: ${{ runner.os }}-ansible-galaxy-${{ hashFiles('requirements.yml') }}
          restore-keys: |
            ${{ runner.os }}-ansible-galaxy-

      - name: Install Ansible Galaxy Dependencies
        run: |
          ansible-galaxy install -r requirements.yml -p galaxy_roles
          ansible-galaxy collection install -r requirements.yml -p galaxy_collections

      - name: Ansible Lint
        run: task lint

      - name: Ansible Syntax Check
        env:
          ANSIBLE_ROLES_PATH: ./galaxy_roles:./roles
          ANSIBLE_COLLECTIONS_PATH: ./galaxy_collections:./collections
        run: |
          ansible-playbook --syntax-check main.yml

  ci:
    if: always()
    needs: [changes, validate-terraform, validate-ansible]
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any job failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "One or more jobs failed or were cancelled"
          exit 1
      - name: All checks passed or skipped
        run: echo "All jobs succeeded or were skipped"
