name: Sync Tailscale ACLs

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  acls:
    permissions:
      contents: read
      id-token: write # This is required for the Tailscale action to request a JWT from GitHub
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Fetch version-cache.json
        uses: actions/cache@v5
        with:
          path: ./version-cache.json
          key: version-cache.json-${{ github.run_id }}
          restore-keys: |
            version-cache.json-

      - name: Test ACL
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        id: test-acl
        uses: tailscale/gitops-acl-action@v1
        with:
          policy-file: tailscale/policy.hujson
          api-key: ${{ secrets.TS_API_KEY }}
          tailnet: ${{ secrets.TS_TAILNET }}
          action: test

      - name: Deploy ACL
        if: github.event_name == 'push' && github.ref_name == 'main'
        id: deploy-acl
        uses: tailscale/gitops-acl-action@v1
        with:
          policy-file: tailscale/policy.hujson
          api-key: ${{ secrets.TS_API_KEY }}
          tailnet: ${{ secrets.TS_TAILNET }}
          action: apply
