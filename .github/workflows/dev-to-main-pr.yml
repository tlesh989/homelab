name: Dev to Main PR

on:
  push:
    branches:
      - dev

permissions:
  pull-requests: write
  contents: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create or Update PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if an open PR from dev to main already exists
          existing_pr=$(gh pr list --state open --base main --head dev --json number --jq '.[0].number // empty')

          if [ -z "$existing_pr" ]; then
            echo "Creating new PR from dev to main"
            pr_url=$(gh pr create \
              --base main \
              --head dev \
              --title "🚀 Release: Merge dev into main" \
              --body "This is an automated PR to merge development changes into the production branch (main).")
            echo "Created PR: $pr_url"
            pr_number=$(gh pr view "$pr_url" --json number --jq '.number')
            echo "Created PR #$pr_number"
          else
            pr_number="$existing_pr"
            echo "PR already exists: #$pr_number"
          fi

          echo "Enabling auto-merge (rebase) on PR #$pr_number"
          gh pr merge "$pr_number" --rebase --auto
