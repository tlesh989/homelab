version: '3'

vars:
  PLAYBOOK: main.yml

tasks:
  default:
    desc: List all available tasks
    silent: true
    cmds:
      - task --list-all
      - |
        echo ""
        echo "-------------------------------------------------------"
        echo " Usage Hints:"
        echo "  - Pass extra args:  task <target> -- --check"
        echo "  - Limit hosts:      task <target> -- --limit <host>"
        echo "  - Debug output:     task <target> -- -vvv"
        echo "-------------------------------------------------------"

  # Internal helper for running playbooks
  ansible:
    internal: true
    cmds:
      - |
        VAULT_ARG=""
        if [ -f .vault_pass ]; then
          VAULT_ARG="--vault-password-file .vault_pass"
        else
          VAULT_ARG="--ask-vault-pass"
        fi
        ansible-playbook -b {{.PLAYBOOK}} $VAULT_ARG --limit {{.LIMIT}} {{.CLI_ARGS}}

  reqs:
    desc: Install Ansible Galaxy requirements
    cmds:
      - ansible-galaxy install -r requirements.yml --force-with-deps

  proxmox:
    desc: Run Ansible playbook for Proxmox hosts
    cmds:
      - task: ansible
        vars: { LIMIT: 'proxmox' }

  tailscale:
    desc: Run Ansible playbook for Tailscale hosts
    cmds:
      - task: ansible
        vars: { LIMIT: 'tailscale' }

  plex:
    desc: Run Ansible playbook for Plex hosts
    cmds:
      - task: ansible
        vars: { LIMIT: 'plex' }

  ping:
    desc: Test connectivity to all hosts
    cmds:
      - ansible all -m ping

  check:
    desc: Dry-run for all hosts
    cmds:
      - |
        VAULT_ARG=""
        if [ -f .vault_pass ]; then
          VAULT_ARG="--vault-password-file .vault_pass"
        else
          VAULT_ARG="--ask-vault-pass"
        fi
        ansible-playbook -b {{.PLAYBOOK}} $VAULT_ARG --check {{.CLI_ARGS}}

  syntax:
    desc: Check playbook syntax
    cmds:
      - ansible-playbook {{.PLAYBOOK}} --syntax-check

  lint:
    desc: Lint the project
    cmds:
      - ansible-lint .

  vault_pass:
    desc: Read vault password from 1Password
    cmds:
      - op read op://CLI/HOMELAB_VAULT_PASS/password > .vault_pass
      - chmod 600 .vault_pass

  decrypt:
    desc: Decrypt vault files
    cmds:
      - ansible-vault decrypt vars/vault.yml
      - ansible-vault decrypt envrc --output .envrc

  encrypt:
    desc: Encrypt vault files
    cmds:
      - ansible-vault encrypt vars/vault.yml
      - ansible-vault encrypt .envrc --output envrc

  gitinit:
    desc: Initialize git hooks
    cmds:
      - ./scripts/git-init.sh
      - echo "ansible vault pre-commit hook installed"
      - echo "don't forget to create a .vault_pass"
