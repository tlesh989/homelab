---
version: "3"

vars:
  PLAYBOOK: main.yml
  LIMIT: all

tasks:
  default:
    desc: List all available tasks
    silent: true
    cmds:
      - task --list-all
      - |
        echo ""
        echo "-------------------------------------------------------"
        echo " Usage Hints:"
        echo "  - Generic deploy:   task deploy -- <group> [--check]"
        echo "  - Pass extra args:  task <target> -- --check"
        echo "  - Limit hosts:      task <target> -- --limit <host>"
        echo "  - Debug output:     task <target> -- -vvv"
        echo "-------------------------------------------------------"

  # Internal helper for running playbooks
  ansible:
    internal: true
    cmds:
      - doppler run -- ansible-playbook -b {{.PLAYBOOK}} --limit {{.LIMIT}} {{.CLI_ARGS}}

  reqs:
    desc: Install Ansible Galaxy requirements
    cmds:
      - ansible-galaxy install -r requirements.yml --force-with-deps --ignore-errors

  setup:
    desc: Write ansible SSH private key from Doppler to ~/.ssh/ansible_ed25519 (run once per machine)
    cmds:
      - doppler run -- sh -c 'mkdir -p ~/.ssh && printf "%s" "$ANSIBLE_SSH_PRIVATE_KEY" > ~/.ssh/ansible_ed25519 && chmod 600 ~/.ssh/ansible_ed25519' # noqa yaml[line-length]

  bootstrap:
    desc: Bootstrap new servers (run once on fresh deployments)
    cmds:
      - doppler run -- ansible-playbook bootstrap.yml --tags bootstrap {{.CLI_ARGS}}

  bootstrap-lxc:
    desc: "Bootstrap a new LXC (run once). Usage: task bootstrap-lxc -- <hostname>"
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Usage: task bootstrap-lxc -- <hostname>"
    cmds:
      - doppler run -- ansible-playbook bootstrap.yml --tags bootstrap --limit "{{.CLI_ARGS}}" -e "ansible_user=root"

  deploy:
    desc: "Deploy to any Ansible host group (usage: task deploy -- <group> [extra-args])"
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Usage: task deploy -- <group> [extra-args]  e.g. task deploy -- glance --check"
    cmds:
      - doppler run -- ansible-playbook -b main.yml --limit {{.CLI_ARGS}}

  proxmox:
    desc: Run Ansible playbook for Proxmox hosts
    cmds:
      - task: ansible
        vars:
          { PLAYBOOK: "main.yml", LIMIT: "proxmox", CLI_ARGS: "{{.CLI_ARGS}}" }

  truenas:
    desc: Configure TrueNAS (iSCSI targets, NFS shares)
    cmds:
      - task: ansible
        vars:
          { PLAYBOOK: "main.yml", LIMIT: "truenas", CLI_ARGS: "{{.CLI_ARGS}}" }

  r8152:
    desc: Install Realtek r8152 DKMS driver on Proxmox hosts
    cmds:
      - task: ansible
        vars:
          {
            PLAYBOOK: "main.yml",
            LIMIT: "proxmox",
            CLI_ARGS: "--tags r8152 {{.CLI_ARGS}}",
          }

  tailscale:
    desc: Run Ansible playbook for Tailscale hosts
    cmds:
      - task: ansible
        vars:
          {
            PLAYBOOK: "main.yml",
            LIMIT: "tailscale",
            CLI_ARGS: "{{.CLI_ARGS}}",
          }

  plex:
    desc: Run Ansible playbook for Plex hosts
    cmds:
      - task: ansible
        vars: { PLAYBOOK: "main.yml", LIMIT: "plex", CLI_ARGS: "{{.CLI_ARGS}}" }

  netdata:
    desc: Deploy Netdata monitoring
    cmds:
      - task: ansible
        vars:
          {
            PLAYBOOK: "main.yml",
            LIMIT: "netdata,proxmox",
            CLI_ARGS: "{{.CLI_ARGS}}",
          }

  arr:
    desc: Deploy arr media stack
    cmds:
      - task: ansible
        vars: { PLAYBOOK: "main.yml", LIMIT: "arr", CLI_ARGS: "{{.CLI_ARGS}}" }

  beets-import:
    desc: Run beets music import on the arr host (tags high-confidence, sweeps rest to music-review)
    cmds:
      - >-
        doppler run -- ansible arr -b -m shell -a
        "docker exec beets beet import -q /data/media/unprocessed/music && (find /data/media/unprocessed/music -mindepth 1 -maxdepth 1 -exec mv {} /data/media/unprocessed/music-review/ \; 2>/dev/null || true)"

  uptime-kuma:
    desc: Deploy Uptime Kuma monitoring server
    cmds:
      - task: ansible
        vars:
          {
            PLAYBOOK: "main.yml",
            LIMIT: "uptime-kuma",
            CLI_ARGS: "{{.CLI_ARGS}}",
          }

  glance:
    desc: Run Ansible playbook for Glance host
    cmds:
      - task: ansible
        vars:
          { PLAYBOOK: "main.yml", LIMIT: "glance", CLI_ARGS: "{{.CLI_ARGS}}" }

  pi-hole:
    desc: Run Ansible playbook for pi-hole host
    cmds:
      - task: ansible
        vars:
          { PLAYBOOK: "main.yml", LIMIT: "pi-hole", CLI_ARGS: "{{.CLI_ARGS}}" }

  ping:
    desc: Test connectivity to all hosts
    cmds:
      - ansible all -m ping

  check:
    desc: Dry-run for all hosts
    cmds:
      - task: ansible
        vars: { PLAYBOOK: "main.yml", CLI_ARGS: "--check {{.CLI_ARGS}}" }

  syntax:
    desc: Check playbook syntax
    cmds:
      - task: ansible
        vars: { PLAYBOOK: "main.yml", CLI_ARGS: "--syntax-check" }

  lint:
    desc: Lint the project
    cmds:
      - ansible-lint .
