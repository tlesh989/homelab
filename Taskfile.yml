---
version: "3"

vars:
  PLAYBOOK: main.yml
  LIMIT: all

tasks:
  default:
    desc: List all available tasks
    silent: true
    cmds:
      - task --list-all
      - |
        echo ""
        echo "-------------------------------------------------------"
        echo " Usage Hints:"
        echo "  - Pass extra args:  task <target> -- --check"
        echo "  - Limit hosts:      task <target> -- --limit <host>"
        echo "  - Debug output:     task <target> -- -vvv"
        echo "-------------------------------------------------------"

  # Internal helper for running playbooks
  ansible:
    internal: true
    cmds:
      - doppler run -- ansible-playbook -b {{.PLAYBOOK}} --limit {{.LIMIT}} {{.CLI_ARGS}}

  reqs:
    desc: Install Ansible Galaxy requirements
    cmds:
      - ansible-galaxy install -r requirements.yml --force-with-deps --ignore-errors

  bootstrap:
    desc: Bootstrap new servers (run once on fresh deployments)
    cmds:
      - doppler run -- ansible-playbook bootstrap.yml {{.CLI_ARGS}}

  proxmox:
    desc: Run Ansible playbook for Proxmox hosts
    cmds:
      - task: ansible
        vars: { PLAYBOOK: "main.yml", LIMIT: "proxmox", CLI_ARGS: "{{.CLI_ARGS}}" }

  tailscale:
    desc: Run Ansible playbook for Tailscale hosts
    cmds:
      - task: ansible
        vars: { PLAYBOOK: "main.yml", LIMIT: "tailscale", CLI_ARGS: "{{.CLI_ARGS}}" }

  plex:
    desc: Run Ansible playbook for Plex hosts
    cmds:
      - task: ansible
        vars: { PLAYBOOK: "main.yml", LIMIT: "plex", CLI_ARGS: "{{.CLI_ARGS}}" }

  glance:
    desc: Run Ansible playbook for Glance host
    cmds:
      - task: ansible
        vars: { PLAYBOOK: "main.yml", LIMIT: "glance", CLI_ARGS: "{{.CLI_ARGS}}" }

  ping:
    desc: Test connectivity to all hosts
    cmds:
      - ansible all -m ping

  check:
    desc: Dry-run for all hosts
    cmds:
      - task: ansible
        vars: { PLAYBOOK: "main.yml", CLI_ARGS: "--check {{.CLI_ARGS}}" }

  syntax:
    desc: Check playbook syntax
    cmds:
      - task: ansible
        vars: { PLAYBOOK: "main.yml", CLI_ARGS: "--syntax-check" }

  lint:
    desc: Lint the project
    cmds:
      - ansible-lint .
