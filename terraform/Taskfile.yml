---
version: "3"

tasks:
  default:
    desc: Run init, fmt, and validate
    cmds:
      - task: test

  init:
    desc: Initialize Terraform
    cmds:
      - doppler run -- sh -c 'TF_TOKEN_app_terraform_io=$TF_TOKEN terraform init'

  ci:
    desc: Run init, fmt, and validate (CI)
    cmds:
      - terraform init -backend=false -input=false
      - terraform fmt -check -recursive
      - terraform validate -no-color

  test:
    desc: Run init, fmt, and validate
    cmds:
      - doppler run -- sh -c 'TF_TOKEN_app_terraform_io=$TF_TOKEN terraform init -backend=false'
      - terraform fmt -check -recursive
      - terraform validate

  plan:
    desc: Format, validate, and plan Terraform changes
    cmds:
      - terraform fmt -check -recursive
      - terraform validate
      - doppler run -- sh -c 'TF_TOKEN_app_terraform_io=$TF_TOKEN terraform plan -out=tfplan.out'

  apply:
    desc: Apply Terraform changes with confirmation
    cmds:
      - doppler run -- sh -c 'TF_TOKEN_app_terraform_io=$TF_TOKEN terraform apply tfplan.out'
      - rm -f tfplan.out
