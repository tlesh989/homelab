---
version: "3"

tasks:
  default:
    desc: Run init, fmt, and validate
    cmds:
      - task: ci

  init:
    desc: Initialize Terraform
    cmds:
      - terraform init

  ci:
    desc: Run init, fmt, and validate
    cmds:
      - doppler run -- sh -c 'TF_TOKEN_app_terraform_io=$TF_TOKEN_APP_TERRAFORM_IO terraform init -backend=false'
      - terraform fmt -check -recursive
      - terraform validate

  test:
    desc: Format, validate, and plan Terraform changes
    cmds:
      - terraform fmt .
      - terraform validate
      - doppler run -- sh -c 'TF_TOKEN_app_terraform_io=$TF_TOKEN_APP_TERRAFORM_IO terraform plan --out=tfplan.out'

  apply:
    desc: Apply Terraform changes with confirmation
    cmds:
      - terraform apply tfplan.out
      - rm -f tfplan.out
