---
fail_fast: false
minimum_pre_commit_version: "4.1.0"
default_language_version:
  python: python3.14

exclude: ^(\.agents/|\.claude/|\.rtk/|\.serena/|\.superpowers/|\.beads/)

repos:
  - repo: https://github.com/pre-commit/sync-pre-commit-deps
    rev: v0.0.3
    hooks:
      - id: sync-pre-commit-deps

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: no-commit-to-branch
        args: ["--branch", "main"]
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
        files: ^scripts/
      - id: check-json
        exclude: ^\.devcontainer/devcontainer\.json$
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-vcs-permalinks
      - id: check-xml
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: \.(tf|tfvars)$ # Let terraform_fmt handle these
      - id: trailing-whitespace
        exclude: \.(tf|tfvars)$ # Let terraform_fmt handle these

  # Fast checks for every commit
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_tflint
        files: ^terraform/.*\.tf$
        args:
          - --args=--config=__GIT_WORKING_DIR__/terraform/.tflint.hcl
          - --args=--recursive
          - --args=--fix
        stages: [pre-commit]
      - id: terraform_docs
        args:
          - --hook-config=--path-to-file=README.md
          - --hook-config=--add-to-existing-file=true
          - --hook-config=--create-file-if-not-exist=true
        stages: [pre-commit]
      - id: terraform_fmt
        stages: [pre-commit]
      - id: terraform_validate
        args:
          - --hook-config=--retry-once-with-cleanup=true
        stages: [pre-commit]

  - repo: https://github.com/ansible/ansible-lint
    rev: v26.4.0
    hooks:
      - id: ansible-lint
        args:
          - --fix
        exclude: ^galaxy_roles/
        stages: [pre-commit]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args:
          - --fix
        files: \.(md|markdown)$
        exclude: ^docs/
        stages: [pre-commit]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        stages: [pre-commit]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        stages: [pre-commit]

  - repo: https://github.com/bridgecrewio/checkov
    rev: "3.2.517"
    hooks:
      - id: checkov
        files: ^terraform/.*\.tf$
        args:
          - --framework
          - terraform
          - --quiet
          - --skip-check
          - CKV2_ANSIBLE_3,CKV2_ANSIBLE_1,CKV_ANSIBLE_1,CKV2_GHA_1,CKV_DOCKER_3,CKV2_DOCKER_1,CKV_DOCKER_2
          - --skip-path
          - .agents
          - --skip-path
          - .claude
          - --skip-path
          - .rtk
          - --skip-path
          - .serena
          - --skip-path
          - .superpowers
          - --skip-path
          - .beads
          - --skip-path
          - docs
          - --skip-path
          - galaxy_roles
          - --skip-path
          - terraform/.terraform
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: beads-sync
        name: beads-sync
        entry: bash -c "command -v bd >/dev/null 2>&1 && bd hooks run pre-commit || exit 0"
        language: system
        stages: [commit]
        always_run: true
      - id: beads-push
        name: beads-push
        entry: bash -c "command -v bd >/dev/null 2>&1 && bd hooks run pre-push || exit 0"
        language: system
        stages: [push]
        always_run: true
      - id: beads-post-checkout
        name: beads-post-checkout
        entry: bash -c "command -v bd >/dev/null 2>&1 && bd hooks run post-checkout || exit 0"
        language: system
        stages: [post-checkout]
        always_run: true
      - id: beads-post-merge
        name: beads-post-merge
        entry: bash -c "command -v bd >/dev/null 2>&1 && bd hooks run post-merge || exit 0"
        language: system
        stages: [post-merge]
        always_run: true