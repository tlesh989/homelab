---
# Watchtower image (pinned per docker.md; matches watchtower role default)
arr_watchtower_version: "1.18.1"

# Storage paths
arr_downloads_path: /data/downloads
arr_media_path: /data/media
arr_config_path: /opt/arr/config

# Ports
arr_qbittorrent_port: 8080
arr_sonarr_port: 8989
arr_radarr_port: 7878
arr_prowlarr_port: 9696
arr_bazarr_port: 6767
arr_seerr_port: 5055
arr_flaresolverr_port: 8191
arr_lidarr_port: 8686
arr_beets_port: 8337

# NFS mount options — hard mount avoids silent I/O errors/corruption on a media
# library if the NFS server blips (soft can return errors mid-write). Standardized
# across all consumers: hard, NFSv4.2, timeo=600. See homelab-1it.
arr_nfs_mount_opts: rw,noatime,nfsvers=4.2,hard,timeo=600,_netdev,x-systemd.automount

# Container user/group (linuxserver PUID/PGID)
arr_puid: "1000"
arr_pgid: "1000"
