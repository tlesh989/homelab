---
- name: Create download staging directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: "{{ arr_puid }}"
    group: "{{ arr_pgid }}"
  loop:
    - "{{ arr_downloads_path }}/incomplete"
    - "{{ arr_downloads_path }}/complete"

- name: Create arr config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: "{{ arr_puid }}"
    group: "{{ arr_pgid }}"
  loop:
    - "{{ arr_config_path }}/compose"
    - "{{ arr_config_path }}/gluetun"
    - "{{ arr_config_path }}/qbittorrent"
    - "{{ arr_config_path }}/sonarr"
    - "{{ arr_config_path }}/radarr"
    - "{{ arr_config_path }}/prowlarr"
    - "{{ arr_config_path }}/bazarr"
    - "{{ arr_config_path }}/seerr"
    - "{{ arr_config_path }}/lidarr"
    - "{{ arr_config_path }}/beets"

- name: Migrate overseerr config to seerr if needed
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      src="{{ arr_config_path }}/overseerr"
      dst="{{ arr_config_path }}/seerr"
      if [ -d "$src" ] && [ -n "$(ls -A "$src" 2>/dev/null)" ] && [ -z "$(ls -A "$dst" 2>/dev/null)" ]; then
        cp -a "$src/." "$dst/"
        echo "migrated_overseerr_to_seerr"
      fi
    executable: /bin/bash
  register: arr_overseerr_to_seerr_migration
  changed_when: '"migrated_overseerr_to_seerr" in arr_overseerr_to_seerr_migration.stdout'
  become: true

- name: Ensure seerr config dir is owned by arr user
  ansible.builtin.file:
    path: "{{ arr_config_path }}/seerr"
    state: directory
    owner: "{{ arr_puid }}"
    group: "{{ arr_pgid }}"
    recurse: true
  become: true

- name: Create media library root directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: "{{ arr_puid }}"
    group: "{{ arr_pgid }}"
  loop:
    - "{{ arr_media_path }}/tv"
    - "{{ arr_media_path }}/movies"
    - "{{ arr_media_path }}/music"

- name: Create unprocessed drop-zone directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: "{{ arr_puid }}"
    group: "{{ arr_pgid }}"
  loop:
    - "{{ arr_media_path }}/unprocessed/tv"
    - "{{ arr_media_path }}/unprocessed/movies"
    - "{{ arr_media_path }}/unprocessed/music"
    - "{{ arr_media_path }}/unprocessed/music-ready"
    - "{{ arr_media_path }}/unprocessed/music-review"
