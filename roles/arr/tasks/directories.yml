---
- name: Create download staging directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: "{{ arr_puid }}"
    group: "{{ arr_pgid }}"
  loop:
    - "{{ arr_downloads_path }}/incomplete"
    - "{{ arr_downloads_path }}/complete"

- name: Create arr config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: "{{ arr_puid }}"
    group: "{{ arr_pgid }}"
  loop:
    - "{{ arr_config_path }}/compose"
    - "{{ arr_config_path }}/gluetun"
    - "{{ arr_config_path }}/qbittorrent"
    - "{{ arr_config_path }}/sonarr"
    - "{{ arr_config_path }}/radarr"
    - "{{ arr_config_path }}/prowlarr"
    - "{{ arr_config_path }}/bazarr"
    - "{{ arr_config_path }}/seerr"

- name: Migrate overseerr config to seerr if needed
  ansible.builtin.shell:
    cmd: |
      set -e
      src="{{ arr_config_path }}/overseerr"
      dst="{{ arr_config_path }}/seerr"
      if [ -d "$src" ] && [ -n "$(ls -A "$src" 2>/dev/null)" ] && [ -z "$(ls -A "$dst" 2>/dev/null)" ]; then
        cp -a "$src/." "$dst/"
      fi
    executable: /bin/bash
  changed_when: false
  become: true

- name: Ensure seerr config dir is owned by node user (UID 1000)
  ansible.builtin.file:
    path: "{{ arr_config_path }}/seerr"
    state: directory
    owner: "1000"
    group: "1000"
    recurse: true
  become: true
