---
acme_domain: "tlesh.xyz"
acme_wildcard: "*.tlesh.xyz"
acme_cert_dir: "/etc/ssl/homelab"
acme_acmesh_home: "/root/.acme.sh"
acme_email: "thomas.lesh@gmail.com"

# Cloudflare API token, scoped to tlesh.xyz only (Zone:DNS:Edit) — from Doppler as CF_DNS_API_TOKEN
acme_cf_token: "{{ lookup('env', 'CF_DNS_API_TOKEN') }}"

# SSH keypair used by deploy hook to push the renewed cert to hosts that
# terminate TLS for *.tlesh.xyz (currently just caddy — see roles/caddy).
acme_deploy_key_path: "/root/.ssh/acme_deploy_ed25519"
acme_deploy_target_hosts: ["caddy.tlesh.xyz"]
# Must match roles/caddy's caddy_deploy_user / caddy_tls_dir defaults.
acme_deploy_remote_user: acme-deploy
acme_deploy_remote_tls_dir: /etc/caddy/tls
