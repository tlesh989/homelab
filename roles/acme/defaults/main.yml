---
acme_domain: "tlesh.xyz"
acme_wildcard: "*.tlesh.xyz"
acme_cert_dir: "/etc/ssl/homelab"
acme_acmesh_home: "/root/.acme.sh"
acme_email: "thomas.lesh@gmail.com"

# Cloudflare API token (Zone:DNS:Edit for tlesh.xyz) — from Doppler as CF_DNS_API_TOKEN
acme_cf_token: "{{ lookup('env', 'CF_DNS_API_TOKEN') }}"

# SSH keypair used by deploy hook to push certs to remote hosts
acme_deploy_key_path: "/root/.ssh/acme_deploy_ed25519"

# Remote hosts that receive cert pushes after each renewal
acme_deploy_targets:
  - host: "{{ hostvars['netdata.tlesh.xyz'].ansible_host }}"
    cert_dest: "/etc/ssl/homelab/fullchain.pem"
    key_dest: "/etc/ssl/homelab/privkey.pem"
    restart_cmd: "systemctl restart netdata"
  - host: "{{ hostvars['tika.tlesh.xyz'].ansible_host }}"
    cert_dest: "/etc/pve/local/pveproxy-ssl.pem"
    key_dest: "/etc/pve/local/pveproxy-ssl.key"
    restart_cmd: "systemctl restart pveproxy"
  - host: "{{ hostvars['bupu.tlesh.xyz'].ansible_host }}"
    cert_dest: "/etc/pve/local/pveproxy-ssl.pem"
    key_dest: "/etc/pve/local/pveproxy-ssl.key"
    restart_cmd: "systemctl restart pveproxy"
  - host: "{{ hostvars['sturm.tlesh.xyz'].ansible_host }}"
    cert_dest: "/etc/pve/local/pveproxy-ssl.pem"
    key_dest: "/etc/pve/local/pveproxy-ssl.key"
    restart_cmd: "systemctl restart pveproxy"

# Inventory hostnames whose root authorized_keys receive the deploy public key
acme_deploy_target_hosts:
  - "netdata.tlesh.xyz"
  - "tika.tlesh.xyz"
  - "bupu.tlesh.xyz"
  - "sturm.tlesh.xyz"
