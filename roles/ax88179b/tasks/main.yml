---
# tasks file for ax88179b — ASIX AX88179B out-of-tree DKMS driver

# Derive installed kernels from /lib/modules (each dir is an installed kernel,
# and its name is exactly the proxmox-headers-<kver> package suffix). This is
# naming-scheme independent — PVE 9 renamed kernel packages pve-kernel-* ->
# proxmox-kernel-*, which broke the old `dpkg -l pve-kernel-*` detection and
# left DKMS without headers (so the driver silently failed to build).
- name: Get list of installed Proxmox kernel versions
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      ls -1 /lib/modules/ 2>/dev/null
      | grep -E '^[0-9]+\.[0-9]+\.[0-9]+.*-pve$'
    executable: /bin/bash
  register: _ax88179b_installed_kernels
  changed_when: false
  failed_when: false

- name: Install headers for all installed Proxmox kernels
  ansible.builtin.apt:
    name: "proxmox-headers-{{ item }}"
    state: present
    update_cache: false
  loop: "{{ _ax88179b_installed_kernels.stdout_lines }}"
  failed_when: false

# Track the default-kernel headers meta so future kernel auto-updates pull the
# matching headers and trigger a DKMS rebuild — without this, an unattended
# kernel upgrade leaves the USB-NIC driver unbuilt and it falls back to the
# in-kernel driver on next reboot (see homelab-1it / homelab-yed).
- name: Ensure proxmox-default-headers is installed (auto-rebuild on kernel updates)
  ansible.builtin.apt:
    name: proxmox-default-headers
    state: present
    update_cache: false
  failed_when: false

- name: Install DKMS build toolchain
  ansible.builtin.apt:
    name:
      - dkms
      - build-essential
    state: present
    update_cache: false

- name: Check if DKMS module already registered
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      dkms status | grep -q "{{ ax88179b_dkms_name }}/{{ ax88179b_driver_version }}"
    executable: /bin/bash
  register: ax88179b_dkms_check
  failed_when: false
  changed_when: false

- name: Install ax88179b DKMS module
  when: ax88179b_dkms_check.rc != 0
  block:
    - name: Copy ASIX driver tarball to remote
      ansible.builtin.copy:
        src: asix-ax88179b.tar.bz2
        dest: /tmp/asix-ax88179b.tar.bz2
        mode: "0644"

    - name: Create DKMS source directory
      ansible.builtin.file:
        path: "/usr/src/{{ ax88179b_dkms_name }}-{{ ax88179b_driver_version }}"
        state: directory
        mode: "0755"

    - name: Extract ASIX driver tarball
      ansible.builtin.unarchive:
        src: /tmp/asix-ax88179b.tar.bz2
        dest: "/usr/src/{{ ax88179b_dkms_name }}-{{ ax88179b_driver_version }}"
        remote_src: true
        extra_opts:
          - "--strip-components=1"

    - name: Template dkms.conf into source directory
      ansible.builtin.template:
        src: dkms.conf.j2
        dest: "/usr/src/{{ ax88179b_dkms_name }}-{{ ax88179b_driver_version }}/dkms.conf"
        mode: "0644"

    - name: Build and install DKMS module for all kernels
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          dkms status "{{ ax88179b_dkms_name }}/{{ ax88179b_driver_version }}" 2>/dev/null \
            | grep -q . \
            || dkms add -m {{ ax88179b_dkms_name }} -v {{ ax88179b_driver_version }}
          RUNNING_KVER=$(uname -r)
          INSTALLED=0
          for kver in /lib/modules/*/; do
            kver="${kver%/}"
            kver="${kver##*/}"
            [ -d "/lib/modules/$kver/build" ] || continue
            dkms status "{{ ax88179b_dkms_name }}/{{ ax88179b_driver_version }}" -k "$kver" \
              2>/dev/null | grep -q installed && continue
            dkms build "{{ ax88179b_dkms_name }}/{{ ax88179b_driver_version }}" -k "$kver" \
              2>/dev/null \
              || { [ "$kver" = "$RUNNING_KVER" ] && exit 1; true; }
            dkms install "{{ ax88179b_dkms_name }}/{{ ax88179b_driver_version }}" -k "$kver" \
              2>/dev/null \
              || { [ "$kver" = "$RUNNING_KVER" ] && exit 1; true; }
            INSTALLED=$((INSTALLED + 1))
          done
          echo "installed=$INSTALLED"
        executable: /bin/bash
      register: _ax88179b_dkms_build
      failed_when: _ax88179b_dkms_build.rc != 0
      changed_when: "'installed=0' not in _ax88179b_dkms_build.stdout"
      notify: Load ax_usb_nic module

- name: Load ax_usb_nic at boot via /etc/modules
  ansible.builtin.lineinfile:
    path: /etc/modules
    line: "{{ ax88179b_module_name }}"
    create: true
    mode: "0644"

- name: Install udev fallback rule for AX88179B # noqa: yaml[line-length]
  ansible.builtin.copy:
    dest: /etc/udev/rules.d/50-ax88179b.rules
    mode: "0644"
    content: |
      # Unbind cdc_ncm if it claims the AX88179B before ax_usb_nic loads, then bind ax_usb_nic.
      # Primary fix is /etc/modules loading ax_usb_nic early; this rule is a fallback.
      # Device: ASIX AX88179B (0b95:1790) — do NOT expand to other USB IDs.
      ACTION=="bind", SUBSYSTEM=="usb", ATTR{idVendor}=="0b95", ATTR{idProduct}=="1790", DRIVER=="cdc_ncm", RUN+="/bin/sh -c 'echo %k > /sys/bus/usb/drivers/cdc_ncm/unbind; echo %k > /sys/bus/usb/drivers/ax_usb_nic/bind'"
  notify: Reload udev rules
