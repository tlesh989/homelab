---
- name: Assert CF_DNS_API_TOKEN is set
  ansible.builtin.assert:
    that: lookup('env', 'CF_DNS_API_TOKEN') | length > 0
    fail_msg: "CF_DNS_API_TOKEN must be set in Doppler — cannot deploy cloudflare_ddns container without it"
  when: not ansible_check_mode

- name: Assert DDNS_DOMAINS is set
  ansible.builtin.assert:
    that: lookup('env', 'DDNS_DOMAINS') | length > 0
    fail_msg: "DDNS_DOMAINS must be set in Doppler — comma-separated list of domains to update (e.g. mc.tlesh.net,684.tlesh.net,684.tlesh.xyz)"
  when: not ansible_check_mode

- name: Install Docker Python SDK
  ansible.builtin.package:
    name: python3-docker
    state: present
  become: true

- name: Deploy Cloudflare DDNS container
  community.docker.docker_container:
    name: cloudflare-ddns
    image: "favonia/cloudflare-ddns:{{ ddns_image_version }}"
    state: started
    restart_policy: always
    env:
      CF_API_TOKEN: "{{ lookup('env', 'CF_DNS_API_TOKEN') }}"
      DOMAINS: "{{ ddns_domains }}"
      PROXIED: "{{ ddns_proxied }}"
      IP6_PROVIDER: none
  become: true
  when: not ansible_check_mode
  no_log: true
