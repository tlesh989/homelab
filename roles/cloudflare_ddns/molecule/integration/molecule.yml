---
# Integration scenario: requires Docker-in-Docker. Run manually with:
#   doppler run -- task molecule-integration ROLE=cloudflare_ddns
role_name_check: 1
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: instance
    image: geerlingguy/docker-ubuntu2604-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /var/run/docker.sock:/var/run/docker.sock
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      roles_path: ${MOLECULE_PROJECT_DIRECTORY}/../
  inventory:
    group_vars:
      all:
        ddns_image_version: "1"
        ddns_proxied: false
verifier:
  name: ansible
