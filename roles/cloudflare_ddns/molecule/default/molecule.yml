---
role_name_check: 1
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: instance
    image: geerlingguy/docker-ubuntu2604-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      roles_path: ${MOLECULE_PROJECT_DIRECTORY}/../
  inventory:
    group_vars:
      all:
        molecule_testing: true
        ddns_image_version: "1"
        ddns_domains: fake.tlesh.net,fake.tlesh.xyz
        ddns_domains_net: fake.tlesh.net
        ddns_domains_xyz: fake.tlesh.xyz
        ddns_proxied: false
  env:
    CF_DNS_API_TOKEN: fake-cf-token-xyz
    CF_DNS_API_TOKEN_NET: fake-cf-token-net
    DDNS_DOMAINS: fake.tlesh.net,fake.tlesh.xyz
    PUSHOVER_API_TOKEN: fake-pushover-token
    PUSHOVER_USER_KEY: fake-pushover-key
verifier:
  name: ansible
