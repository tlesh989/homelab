---
# tasks file for netdata

- name: Install Netdata via kickstart script
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      wget -O /tmp/netdata-kickstart.sh https://get.netdata.cloud/kickstart.sh
      bash /tmp/netdata-kickstart.sh --non-interactive --stable-channel 2>&1
    executable: /bin/bash
    creates: /usr/sbin/netdata
  become: true
  when: not ansible_check_mode

- name: Configure Netdata streaming (child to parent)
  ansible.builtin.blockinfile:
    path: /etc/netdata/stream.conf
    create: true
    mode: "0640"
    marker: "# {mark} ANSIBLE MANAGED STREAMING"
    block: |
      [stream]
      enabled = yes
      destination = {{ netdata_parent_host }}:{{ netdata_parent_port }}
      api key = {{ netdata_stream_api_key }}
  become: true
  when: netdata_role == "child"
  no_log: true
  notify: Restart Netdata

- name: Configure Netdata stream acceptance on parent
  ansible.builtin.blockinfile:
    path: /etc/netdata/stream.conf
    create: true
    mode: "0640"
    marker: "# {mark} ANSIBLE MANAGED PARENT STREAM ACCEPTANCE"
    block: |
      [{{ netdata_stream_api_key }}]
      enabled = yes
      allow from = 192.168.233.*
  become: true
  when: netdata_role == "parent"
  no_log: true
  notify: Restart Netdata

- name: Ensure Netdata is enabled and started
  ansible.builtin.systemd:
    name: netdata
    enabled: true
    state: started
  ignore_errors: "{{ ansible_check_mode }}"
  become: true

- name: Configure TrueNAS go.d collector
  ansible.builtin.copy:
    dest: /etc/netdata/go.d/truenas.conf
    owner: netdata
    group: netdata
    mode: "0640"
    content: |
      jobs:
        - name: truenas
          url: "https://{{ truenas_host }}"
          token: "{{ truenas_api_key_netdata }}"
          tls_skip_verify: true
  become: true
  when: netdata_role == "parent"
  no_log: true
  notify: Restart Netdata

- name: Create cert directory for acme deploy hook
  ansible.builtin.file:
    path: "{{ netdata_cert_dir }}"
    state: directory
    mode: "0750"
    owner: root
    group: netdata
  become: true
  when: netdata_role == "parent"

- name: Add sudo rule for ansible user to refresh certificates
  vars:
    _sudo_rule: >-
      {{ ansible_user }} ALL=(ALL) NOPASSWD:
      /bin/mkdir -p {{ netdata_cert_dir }},
      /bin/mv /tmp/acme-fullchain.pem {{ netdata_cert_dir }}/fullchain.pem,
      /bin/mv /tmp/acme-privkey.pem {{ netdata_cert_dir }}/privkey.pem,
      /bin/chmod 640 {{ netdata_cert_dir }}/fullchain.pem,
      /bin/chmod 640 {{ netdata_cert_dir }}/privkey.pem,
      /bin/systemctl restart netdata
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/92-netdata-cert-refresh
    line: "{{ _sudo_rule }}"
    create: true
    mode: "0440"
  become: true
  when:
    - netdata_role == "parent"
    - ansible_user is defined and ansible_user != "root"

- name: Check if homelab cert has been deployed
  ansible.builtin.stat:
    path: "{{ netdata_cert_dir }}/fullchain.pem"
  register: _netdata_cert
  when: netdata_role == "parent"

- name: Configure Netdata SSL (enabled once cert is present)
  ansible.builtin.blockinfile:
    path: /etc/netdata/netdata.conf
    create: true
    mode: "0640"
    marker: "# {mark} ANSIBLE MANAGED SSL"
    block: |
      [web]
          ssl key = {{ netdata_cert_dir }}/privkey.pem
          ssl certificate = {{ netdata_cert_dir }}/fullchain.pem
  become: true
  when:
    - netdata_role == "parent"
    - _netdata_cert.stat.exists | default(false)
  notify: Restart Netdata
