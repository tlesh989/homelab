---
- name: Stop Netdata service
  ansible.builtin.systemd:
    name: netdata
    state: stopped
    enabled: false
  register: _netdata_stop
  failed_when:
    - _netdata_stop is failed
    - "'Could not find the requested service' not in (_netdata_stop.msg | default(''))"
  become: true

- name: Check for Netdata uninstaller script
  ansible.builtin.stat:
    path: /usr/libexec/netdata/netdata-uninstaller.sh
  register: _netdata_uninstaller
  become: true

- name: Run Netdata kickstart uninstaller if present
  ansible.builtin.shell:
    cmd: set -o pipefail && /usr/libexec/netdata/netdata-uninstaller.sh --yes --force
    executable: /bin/bash
  when: _netdata_uninstaller.stat.exists
  become: true
  changed_when: true

- name: Remove Netdata apt package if present
  ansible.builtin.apt:
    name:
      - netdata
      - netdata-core
      - netdata-plugins-bash
      - netdata-plugins-python
    state: absent
    purge: true
  become: true

- name: Remove Netdata cron updater
  ansible.builtin.file:
    path: /etc/cron.daily/netdata-updater
    state: absent
  become: true

- name: Remove Netdata config directory
  ansible.builtin.file:
    path: /etc/netdata
    state: absent
  become: true

- name: Remove Netdata data and lib directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/lib/netdata
    - /var/cache/netdata
    - /var/log/netdata
    - /usr/libexec/netdata
    - /usr/share/netdata
  become: true

- name: Remove Netdata sudoers file
  ansible.builtin.file:
    path: /etc/sudoers.d/92-netdata-cert-refresh
    state: absent
  become: true

- name: Remove netdata system user
  ansible.builtin.user:
    name: netdata
    state: absent
    remove: true
  become: true

- name: Remove netdata system group
  ansible.builtin.group:
    name: netdata
    state: absent
  become: true
