---
- name: Create Glance config directory
  ansible.builtin.file:
    path: "{{ glance_data_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: Template Glance config
  ansible.builtin.template:
    src: glance.yml.j2
    dest: "{{ glance_data_dir }}/glance.yml"
    mode: "0644"
  become: true
  notify: Restart glance

- name: Install Docker Python SDK
  ansible.builtin.package:
    name: python3-docker
    state: present
  become: true

- name: Deploy Glance container
  community.docker.docker_container:
    name: glance
    image: "glanceapp/glance:{{ glance_version }}"
    state: started
    restart_policy: always
    ports:
      - "{{ glance_port | string }}:{{ glance_port | string }}"
    volumes:
      - "{{ glance_data_dir }}/glance.yml:/app/glance.yml:ro"
  become: true
  when: not ansible_check_mode
