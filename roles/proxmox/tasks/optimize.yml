# https://github.com/dronenb/ansible-role-proxmox
---
# tasks file for proxmox
- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Remove Proxmox enterprise repo from apt
  loop:
    - /etc/apt/sources.list.d/pve-enterprise.list
    - /etc/apt/sources.list.d/pve-enterprise.list.dpkg-dist
    - /etc/apt/sources.list.d/ceph.list
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent

- name: Variabilize Proxmox no-sub repo
  ansible.builtin.set_fact:
    proxmox_no_sub_repo: pve-install-repo

- name: Add Proxmox VE no subscription repo
  ansible.builtin.apt_repository:
    filename: "{{ proxmox_no_sub_repo }}"
    repo: >-
      deb http://download.proxmox.com/debian/pve
        {{ ansible_facts.distribution_release }} pve-no-subscription
    state: present

- name: Find Proxmox VE no sub repos for older distributions
  ansible.builtin.command:
    cmd: >-
      grep -v {{ ansible_facts.distribution_release }}
        /etc/apt/sources.list.d/{{ proxmox_no_sub_repo }}.list
  register: old_repos
  changed_when: false
  failed_when: false

- name: Remove Proxmox VE no subscription repo for older distributions
  loop: "{{ old_repos.stdout_lines }}"
  ansible.builtin.apt_repository:
    filename: "{{ proxmox_no_sub_repo }}"
    repo: "{{ item }}"
    state: absent

- name: Add proxmoxlib.js path to variable
  ansible.builtin.set_fact:
    proxmoxlib_path: >-
      /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js

- name: Check proxmoxlib.js.bak exists
  ansible.builtin.stat:
    path: "{{ proxmoxlib_path }}.bak"
  register: pmx_js_bak

- name: Make backup from proxmoxlib.js
  when: not pmx_js_bak.stat.exists
  ansible.builtin.copy:
    src: "{{ proxmoxlib_path }}"
    dest: "{{ proxmoxlib_path }}.bak"
    remote_src: true
    mode: '644'

- name: Remove no valid sub popup
  ansible.builtin.replace:
    path: "{{ proxmoxlib_path }}"
    regexp: >-
      (^\s+)(Ext.Msg.show\(\{\s+title:\s+gettext\('No valid subscription)
    replace: '\1void({ //\2'
  notify: Restart pveproxy

- name: Enable IOMMU (Intel)
  when: >-
    ansible_facts.processor |
      list |
      intersect(['GenuineIntel']) |
      length > 0
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT=.*$'
    line: >-
      GRUB_CMDLINE_LINUX_DEFAULT="quiet mitigations=off intel_iommu=on iommu=pt
      intel_pstate=disable nofb nomodeset video=efifb:off
      systemd.unified_cgroup_hierarchy=1"
    state: present
  notify: Update grub

- name: Enable IOMMU (AMD)
  when: >-
    ansible_facts.processor |
      list |
      intersect(['AuthenticAMD']) |
      length > 0
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT=.*$'
    line: >-
      GRUB_CMDLINE_LINUX_DEFAULT="quiet mitigations=off amd_iommu=on iommu=pt
      kvm.ignore_msrs=1 kvm.report_ignored_msrs=0 nofb nomodeset video=efifb:off
      systemd.unified_cgroup_hierarchy=1"
    state: present
  notify: Update grub

- name: Configure AMD CPU power states
  when: >-
    ansible_facts.processor |
      list |
      intersect(['AuthenticAMD']) |
      length > 0
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    search_string: GRUB_CMDLINE_LINUX
    line: 'GRUB_CMDLINE_LINUX="processor.max_cstate=1 amd_idle.max_cstate=1"'
    state: present
  notify: Update grub

- name: Get PCI devices information
  ansible.builtin.command: lspci -nn
  register: lspci_output
  changed_when: false

- name: Extract GPU vendor and device IDs
  ansible.builtin.set_fact:
    gpu_info: "{{ lspci_output.stdout | regex_search('VGA.*\\[(\\w+):(\\w+)\\]', '\\1', '\\2') }}"

- name: Set GPU vendor and device IDs
  ansible.builtin.set_fact:
    gpu_vendor_id: "{{ gpu_info[0] }}"
    gpu_device_id: "{{ gpu_info[1] }}"

- name: Configure modprobe for GPU passthrough
  ansible.builtin.copy:
    dest: /etc/modprobe.d/vfio.conf
    content: |
      options vfio-pci ids={{ gpu_vendor_id }}:{{ gpu_device_id }}
      options kvm ignore_msrs=1
      options kvm report_ignored_msrs=0
    mode: '0644'
  notify: Update initramfs

- name: Debug GPU IDs
  ansible.builtin.debug:
    msg: "Found GPU with vendor ID {{ gpu_vendor_id }} and device ID {{ gpu_device_id }}"
