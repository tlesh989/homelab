---
# tasks file for proxmox — storage backend registration
# Note: bpg/proxmox provider does not support iSCSI/LVM storage resources in 0.98.1
# Using pvesh CLI to register storage backends idempotently.

- name: Check if iSCSI storage backend exists
  ansible.builtin.shell:
    cmd: "pvesh get /storage/truenas-iscsi --output-format json"
    executable: /bin/bash
  register: _proxmox_iscsi_storage
  changed_when: false
  failed_when: false

- name: Register iSCSI storage backend
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      pvesh create /storage
      --storage truenas-iscsi
      --type iscsi
      --portal {{ truenas_iscsi_portal_ip }}
      --target iqn.2005-10.org.freenas.ctl:{{ truenas_iscsi_target_name }}
      --nodes bupu,sturm,tika
    executable: /bin/bash
  when: _proxmox_iscsi_storage.rc != 0
  register: _proxmox_iscsi_register
  changed_when: _proxmox_iscsi_register.rc == 0
  failed_when:
    - _proxmox_iscsi_register.rc != 0
    - "'is not online' not in _proxmox_iscsi_register.stderr"

- name: Warn — iSCSI storage not online yet (run task truenas first)
  ansible.builtin.debug:
    msg: >-
      iSCSI storage registration skipped: TrueNAS target not online yet.
      Run 'task truenas' to configure TrueNAS iSCSI, then re-run 'task proxmox'.
  when:
    - _proxmox_iscsi_storage.rc != 0
    - _proxmox_iscsi_register is defined
    - "'is not online' in (_proxmox_iscsi_register.stderr | default(''))"

- name: Check if LVM storage backend exists
  ansible.builtin.shell:
    cmd: "pvesh get /storage/truenas-lvm --output-format json"
    executable: /bin/bash
  register: _proxmox_lvm_storage
  changed_when: false
  failed_when: false

- name: Register LVM storage backend
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      pvesh create /storage
      --storage truenas-lvm
      --type lvm
      --vgname {{ truenas_lvm_vg_name }}
      --shared 1
      --content rootdir,images
      --nodes bupu,sturm,tika
    executable: /bin/bash
  when: _proxmox_lvm_storage.rc != 0
  register: _proxmox_lvm_register
  changed_when: _proxmox_lvm_register.rc == 0
  failed_when:
    - _proxmox_lvm_register.rc != 0
    - "'is not online' not in (_proxmox_lvm_register.stderr | default(''))"

- name: Install multipath-tools
  ansible.builtin.apt:
    name: multipath-tools
    state: present

- name: Deploy multipath configuration
  ansible.builtin.copy:
    dest: /etc/multipath.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      defaults {
        path_grouping_policy failover
        failback immediate
      }
      blacklist {
        devnode "^(sd[a-z]|nvme[0-9]+n[0-9]+)$"
      }
      blacklist_exceptions {
        property "SCSI_IDENT_.*"
      }
  notify: Restart multipathd

- name: Ensure multipathd is enabled and running
  ansible.builtin.systemd:
    name: multipathd
    enabled: true
    state: started
  when: not ansible_check_mode

# ── proxmox-nfs: enforce hard mount options (data-safety, homelab-1it) ────────
# storage.cfg is cluster-wide, so this runs once. Config-only: it does NOT remount
# the live NFS mount (umounting a busy VM-image store would disrupt running guests).
# After this changes, remount /mnt/pve/proxmox-nfs per node in a maintenance window.

- name: Get proxmox-nfs storage config
  ansible.builtin.shell:
    cmd: "set -o pipefail && pvesh get /storage/{{ proxmox_nfs_storage_id }} --output-format json"
    executable: /bin/bash
  register: _proxmox_nfs_storage
  changed_when: false
  failed_when: false
  run_once: true

- name: Enforce hard NFS mount options on proxmox-nfs storage
  ansible.builtin.shell:
    cmd: "set -o pipefail && pvesm set {{ proxmox_nfs_storage_id }} --options {{ proxmox_nfs_storage_options }}"
    executable: /bin/bash
  register: _proxmox_nfs_set
  changed_when: _proxmox_nfs_set.rc == 0
  run_once: true
  become: true
  when:
    - _proxmox_nfs_storage.rc == 0
    - (_proxmox_nfs_storage.stdout | from_json).options | default('') != proxmox_nfs_storage_options

- name: Warn — proxmox-nfs needs remount to apply new options # noqa: no-handler
  ansible.builtin.debug:
    msg: >-
      proxmox-nfs mount options updated to '{{ proxmox_nfs_storage_options }}'.
      Existing mounts still use the old options — remount /mnt/pve/proxmox-nfs on
      each node (deactivate/reactivate the storage or reboot) in a maintenance window.
  run_once: true
  when: _proxmox_nfs_set is changed

# ── iSCSI CHAP initiator config (opt-in, default OFF, homelab-1it) ────────────
# Sets CHAP credentials on the Proxmox iSCSI node records. Harmless while the
# TrueNAS target still accepts authmethod=NONE. Does NOT re-login sessions —
# re-login (or reboot) per node in a window after the target is flipped to CHAP.

# iscsiadm -o update accepts only ONE -n/-v pair per call, so set each field in
# its own invocation. Values are quoted to avoid shell-expansion/exposure.
- name: Set CHAP credentials on iSCSI node records
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      iscsiadm -m node
      -T iqn.2005-10.org.freenas.ctl:{{ truenas_iscsi_target_name }}
      -p {{ truenas_iscsi_portal_ip }}:3260
      -o update
      -n {{ item.name | quote }} -v {{ item.value | quote }}
    executable: /bin/bash
  loop:
    - { name: "node.session.auth.authmethod", value: "CHAP" }
    - { name: "node.session.auth.username", value: "{{ proxmox_iscsi_chap_user }}" }
    - { name: "node.session.auth.password", value: "{{ proxmox_iscsi_chap_secret }}" }
  loop_control:
    label: "{{ item.name }}"
  changed_when: true
  no_log: true
  become: true
  when:
    - proxmox_iscsi_chap_enabled | bool
    - proxmox_iscsi_chap_user | length > 0
    - proxmox_iscsi_chap_secret | length >= 12
    - proxmox_iscsi_chap_secret | length <= 16
