---
- name: Manage Proxmox Repositories
  ansible.builtin.include_tasks: repos.yml

- name: Optimize Proxmox VE
  ansible.builtin.include_tasks: optimize.yml

- name: Hardware-Specific Optimizations
  ansible.builtin.include_tasks: hardware.yml

- name: Configure network interfaces
  ansible.builtin.include_tasks: network.yml

- name: Configure storage backends
  ansible.builtin.include_tasks: storage.yml

- name: Check ceph status
  ansible.builtin.shell:
    cmd: set -o pipefail && pveceph status 2>&1 | grep -v "not initialized"
    executable: /bin/bash
  register: proxmox_pveceph_status
  failed_when: false
  changed_when: false

- name: Disable Ceph
  ansible.builtin.include_tasks: ceph.yml
  when:
    - proxmox_ceph_disabled is true
    - proxmox_pveceph_status.rc == 0
    - "'binary not installed' not in proxmox_pveceph_status.stdout"

- name: Configure NFS mounts
  ansible.builtin.include_tasks: nfs-mounts.yml

- name: Configure LXC device passthrough
  ansible.builtin.include_tasks: lxc-devices.yml

- name: Add sudo rule for ansible user to refresh pveproxy certificates
  vars:
    _sudo_rule: >-
      {{ ansible_user }} ALL=(ALL) NOPASSWD:
      /bin/mkdir -p /etc/pve/local,
      /bin/mv /tmp/acme-fullchain.pem /etc/pve/local/pveproxy-ssl.pem,
      /bin/mv /tmp/acme-privkey.pem /etc/pve/local/pveproxy-ssl.key,
      /bin/chown root:root /etc/pve/local/pveproxy-ssl.pem,
      /bin/chown root:root /etc/pve/local/pveproxy-ssl.key,
      /bin/chmod 640 /etc/pve/local/pveproxy-ssl.pem,
      /bin/chmod 640 /etc/pve/local/pveproxy-ssl.key,
      /bin/systemctl restart pveproxy
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/92-pveproxy-cert-refresh
    regexp: "^{{ ansible_user }} ALL="
    line: "{{ _sudo_rule }}"
    create: true
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s
  become: true
  when: ansible_user is defined and ansible_user != "root"
