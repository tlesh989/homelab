---
- name: Detect Proxmox VE version
  ansible.builtin.command: pveversion
  register: pve_version_raw
  changed_when: false
  check_mode: false

- name: Set Proxmox version facts
  ansible.builtin.set_fact:
    pve_major_version: "{{ (pve_version_raw.stdout | regex_search('pve-manager/(\\d+)', '\\1'))[0] | default('9') }}"

- name: Disable legacy sources (.list)
  when: proxmox_migrate_to_deb822 | bool
  block:
    - name: Find legacy .list files
      ansible.builtin.find:
        paths: /etc/apt/sources.list.d/
        patterns: "*.list"
      register: legacy_list_files

    - name: Rename legacy .list files to .bak
      ansible.builtin.command:
        cmd: "mv {{ item.path }} {{ item.path }}.bak"
        creates: "{{ item.path }}.bak"
        removes: "{{ item.path }}"
      loop: "{{ legacy_list_files.files }}"
      when: legacy_list_files.matched > 0

    - name: Check if /etc/apt/sources.list exists
      ansible.builtin.stat:
        path: /etc/apt/sources.list
      register: sources_list_stat

    - name: Disable entries in /etc/apt/sources.list
      ansible.builtin.replace:
        path: /etc/apt/sources.list
        regexp: '^(\s*deb )'
        replace: '# Disabled by Ansible - \1'
      register: sources_list_disable
      when: sources_list_stat.stat.exists

- name: Configure deb822 sources
  when: proxmox_migrate_to_deb822 | bool
  block:
    - name: Create debian.sources
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/debian.sources
        content: |
          Types: deb
          URIs: http://deb.debian.org/debian
          Suites: {{ ansible_facts.distribution_release }}
          Components: main contrib
          Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg

          Types: deb
          URIs: http://security.debian.org/debian-security
          Suites: {{ ansible_facts.distribution_release }}-security
          Components: main contrib
          Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg

          Types: deb
          URIs: http://deb.debian.org/debian
          Suites: {{ ansible_facts.distribution_release }}-updates
          Components: main contrib
          Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg
        mode: '0644'

    - name: Create proxmox.sources
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/proxmox.sources
        content: |
          Types: deb
          URIs: http://download.proxmox.com/debian/pve
          Suites: {{ ansible_facts.distribution_release }}
          Components: pve-no-subscription
          Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
          Enabled: {{ proxmox_pve_no_subscription | bool | lower }}

          Types: deb
          URIs: https://enterprise.proxmox.com/debian/pve
          Suites: {{ ansible_facts.distribution_release }}
          Components: pve-enterprise
          Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
          Enabled: false

          Types: deb
          URIs: http://download.proxmox.com/debian/pve
          Suites: {{ ansible_facts.distribution_release }}
          Components: pve-test
          Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
          Enabled: {{ proxmox_pve_test | bool | lower }}
        mode: '0644'

    - name: Create ceph.sources
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/ceph.sources
        content: |
          Types: deb
          URIs: http://download.proxmox.com/debian/ceph-{{ (pve_major_version == '9') | ternary('squid', 'reef') }}
          Suites: {{ ansible_facts.distribution_release }}
          Components: no-subscription
          Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
          Enabled: {{ proxmox_ceph_repo | bool | lower }}
        mode: '0644'
