---
# defaults file for proxmox

# Repository Management
proxmox_migrate_to_deb822: true
proxmox_pve_no_subscription: true
proxmox_pve_test: false
proxmox_ceph_repo: true # Squid for PVE 9, Reef for PVE 8

# Optimizations
proxmox_remove_nag: true

# High Availability
proxmox_disable_ha: true # override false in group_vars for clusters
proxmox_ha_guests: [] # list of {type: vm|ct, vmid: N} to enroll in ha-manager

# Ceph Management
proxmox_ceph_enabled: false

# Hardware-Specific Optimizations
proxmox_zfs_arc_limit: true
proxmox_zfs_arc_max: 0 # 0 means automatic (2GB for <16GB RAM, 4GB for 32GB+)
proxmox_enable_sriov: true # Intel iGPU SR-IOV (Experimental)
proxmox_sysctl_optimizations: true

# Storage network bridge MTU — set to 9000 for jumbo frames on storage VLAN
proxmox_storage_mtu: 9000

# Cluster-wide vzdump backup job (created once via pvesh; idempotent by id).
# Backs up all guests to the TrueNAS NFS storage with prune-based retention.
proxmox_backup_enabled: true
proxmox_backup_id: ansible-daily
proxmox_backup_storage: proxmox-nfs
proxmox_backup_schedule: "02:00"
proxmox_backup_mode: snapshot
proxmox_backup_prune: keep-daily=7,keep-weekly=4,keep-monthly=3
