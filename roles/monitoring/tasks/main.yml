---
- name: Install Docker Python SDK
  ansible.builtin.package:
    name: python3-docker
    state: present
  become: true

- name: Create Prometheus directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "65534" # nobody — Prometheus container UID for bind-mount write access
    group: "65534"
    mode: "0755"
  loop:
    - "{{ prometheus_config_dir }}"
    - "{{ prometheus_data_dir }}"
  become: true

- name: Create Grafana directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "472" # grafana — Grafana container UID for bind-mount write access
    group: "472"
    mode: "0755"
  loop:
    - "{{ grafana_data_dir }}"
    - "{{ grafana_provisioning_dir }}/datasources"
    - "{{ grafana_dashboards_dir }}"
    - "{{ grafana_alerting_dir }}"
  become: true

- name: Create monitoring Docker network
  community.docker.docker_network:
    name: "{{ monitoring_network }}"
    state: present
  become: true
  when:
    - not ansible_check_mode
    - not (molecule_testing | default(false))

- name: Template Prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config_dir }}/prometheus.yml"
    owner: "65534"
    group: "65534"
    mode: "0644"
  become: true
  notify: Restart Prometheus

- name: Template Grafana datasource provisioning
  ansible.builtin.template:
    src: grafana-datasource.yml.j2
    dest: "{{ grafana_provisioning_dir }}/datasources/prometheus.yml"
    owner: "472"
    group: "472"
    mode: "0644"
  become: true
  notify: Restart Grafana

- name: Template Grafana dashboard provider
  ansible.builtin.template:
    src: grafana-dashboards-provider.yml.j2
    dest: "{{ grafana_dashboards_dir }}/provider.yml"
    owner: "472"
    group: "472"
    mode: "0644"
  become: true
  notify: Restart Grafana

- name: Copy dashboard JSON files
  ansible.builtin.copy:
    src: "dashboards/{{ item }}"
    dest: "{{ grafana_dashboards_dir }}/{{ item }}"
    owner: "472"
    group: "472"
    mode: "0644"
  loop:
    - node-exporter-full.json
    - cadvisor-dashboard.json
    - proxmox-dashboard.json
    - pihole-dashboard.json
  become: true
  notify: Restart Grafana

- name: Remove stale scraparr dashboard
  ansible.builtin.file:
    path: "{{ grafana_dashboards_dir }}/scraparr-dashboard.json"
    state: absent
  become: true
  notify: Restart Grafana

- name: Copy Grafana alerting provisioning files
  ansible.builtin.copy:
    src: "alerting/{{ item }}"
    dest: "{{ grafana_alerting_dir }}/{{ item }}"
    owner: "472"
    group: "472"
    mode: "0644"
  loop:
    - contact-points.yaml
    - rules.yaml
  become: true
  notify: Restart Grafana

- name: Deploy Prometheus container
  community.docker.docker_container:
    name: prometheus
    image: "prom/prometheus:{{ prometheus_version }}"
    state: started
    restart_policy: always
    networks:
      - name: "{{ monitoring_network }}"
    ports:
      - "{{ prometheus_port | string }}:9090"
    volumes:
      - "{{ prometheus_config_dir }}/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "{{ prometheus_data_dir }}:/prometheus"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time={{ prometheus_retention }}"
      - "--web.enable-lifecycle"
  become: true
  when:
    - not ansible_check_mode
    - not (molecule_testing | default(false))

- name: Verify Grafana alerting secrets are set
  ansible.builtin.assert:
    that:
      - lookup('env', 'PUSHOVER_API_TOKEN') | length > 0
      - lookup('env', 'PUSHOVER_USER_KEY') | length > 0
    fail_msg: "PUSHOVER_API_TOKEN and PUSHOVER_USER_KEY must be set before provisioning Grafana alerting."
  when:
    - not (molecule_testing | default(false))

- name: Deploy Grafana container
  community.docker.docker_container:
    name: grafana
    image: "grafana/grafana:{{ grafana_version }}"
    state: started
    restart_policy: always
    networks:
      - name: "{{ monitoring_network }}"
    ports:
      - "{{ grafana_port | string }}:3000"
    volumes:
      - "{{ grafana_data_dir }}:/var/lib/grafana"
      - "{{ grafana_provisioning_dir }}/datasources:/etc/grafana/provisioning/datasources:ro"
      - "{{ grafana_dashboards_dir }}:/etc/grafana/provisioning/dashboards:ro"
      - "{{ grafana_alerting_dir }}:/etc/grafana/provisioning/alerting:ro"
    env:
      GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password }}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      PUSHOVER_API_TOKEN: "{{ lookup('env', 'PUSHOVER_API_TOKEN') }}"
      PUSHOVER_USER_KEY: "{{ lookup('env', 'PUSHOVER_USER_KEY') }}"
  become: true
  when:
    - not ansible_check_mode
    - not (molecule_testing | default(false))
  no_log: true

- name: Deploy cAdvisor container
  community.docker.docker_container:
    name: cadvisor
    image: "ghcr.io/google/cadvisor:{{ cadvisor_version }}"
    state: started
    restart_policy: always
    ports:
      - "{{ cadvisor_port | string }}:8080"
    volumes:
      - "/:/rootfs:ro"
      - "/var/run:/var/run:ro"
      - "/sys:/sys:ro"
      - "/var/lib/docker:/var/lib/docker:ro"
      - "/dev/disk:/dev/disk:ro"
    devices:
      - "/dev/kmsg"
    privileged: true # required for complete container metrics (cgroup, disk I/O)
  become: true
  when:
    - not ansible_check_mode
    - not (molecule_testing | default(false))

- name: Create pve-exporter config directory
  ansible.builtin.file:
    path: "{{ pve_exporter_config_dir }}"
    state: directory
    owner: "65534"
    group: "65534"
    mode: "0755"
  become: true

- name: Verify pve-exporter credentials are set
  ansible.builtin.assert:
    that:
      - lookup('env', 'PVE_TOKEN_ID') | length > 0
      - lookup('env', 'PVE_TOKEN_SECRET') | length > 0
    fail_msg: "PVE_TOKEN_ID and PVE_TOKEN_SECRET must be set before templating pve-exporter config."
  when:
    - not (molecule_testing | default(false))

- name: Template pve-exporter credentials config
  ansible.builtin.template:
    src: pve-exporter.yml.j2
    dest: "{{ pve_exporter_config_dir }}/pve.yml"
    owner: "65534"
    group: "65534"
    mode: "0600"
  become: true
  no_log: true
  notify: Restart pve-exporter

- name: Deploy pve-exporter container
  community.docker.docker_container:
    name: pve-exporter
    image: "prompve/prometheus-pve-exporter:{{ pve_exporter_version }}"
    state: started
    restart_policy: always
    ports:
      - "{{ pve_exporter_port | string }}:9221"
    volumes:
      - "{{ pve_exporter_config_dir }}/pve.yml:/etc/prometheus/pve.yml:ro"
  become: true
  when:
    - not ansible_check_mode
    - not (molecule_testing | default(false))

- name: Create Dozzle data directory
  ansible.builtin.file:
    path: "{{ dozzle_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Deploy Dozzle container
  community.docker.docker_container:
    name: dozzle
    image: "amir20/dozzle:{{ dozzle_version }}"
    state: started
    restart_policy: always
    published_ports: []
    networks:
      - name: "{{ monitoring_network }}"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "{{ dozzle_data_dir }}:/data"
    env:
      DOZZLE_REMOTE_AGENT: "{{ dozzle_agent_host }}:{{ dozzle_agent_port | string }}"
  become: true
  when:
    - not ansible_check_mode
    - not (molecule_testing | default(false))

- name: Verify TrueNAS Prometheus API key is set
  ansible.builtin.assert:
    that:
      - lookup('env', 'TRUENAS_PROM_KEY') | length > 0
    fail_msg: "TRUENAS_PROM_KEY must be set in Doppler before deploying truenas-exporter."
  when:
    - not (molecule_testing | default(false))

- name: Deploy truenas-exporter container
  community.docker.docker_container:
    name: truenas-exporter
    image: "ghcr.io/unknowlars/truenas-scale-api-prometheus-exporter:{{ truenas_exporter_version }}"
    state: started
    restart_policy: always
    ports:
      - "{{ truenas_exporter_port | string }}:9108"
    env:
      TRUENAS_WS_URL: "{{ truenas_host }}"
      TRUENAS_API_KEY: "{{ lookup('env', 'TRUENAS_PROM_KEY') }}"
      EXPORTER_PORT: "9108"
  become: true
  when:
    - not ansible_check_mode
    - not (molecule_testing | default(false))
  no_log: true

- name: Download TrueNAS exporter Grafana dashboard JSON
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/Unknowlars/truenas-scale-api-prometheus-exporter/{{ truenas_dashboard_ref }}/grafana-dashboard/operations-center-dashboard.json"
    dest: "{{ grafana_dashboards_dir }}/truenas-exporter-dashboard.json"
    owner: "472"
    group: "472"
    mode: "0644"
  become: true
  notify: Restart Grafana
  when:
    - not (molecule_testing | default(false))

- name: Verify UniFi read-only credentials are set
  ansible.builtin.assert:
    that:
      - lookup('env', 'UNIFI_RO_USERNAME') | length > 0
      - lookup('env', 'UNIFI_RO_PASSWORD') | length > 0
    fail_msg: "UNIFI_RO_USERNAME and UNIFI_RO_PASSWORD must be set in Doppler before deploying unpoller."
  when:
    - not (molecule_testing | default(false))

- name: Deploy unpoller container
  community.docker.docker_container:
    name: unpoller
    image: "ghcr.io/unpoller/unpoller:{{ unpoller_version }}"
    state: started
    restart_policy: always
    ports:
      - "{{ unpoller_port | string }}:9130"
    env:
      UP_UNIFI_DEFAULT_URL: "{{ unifi_controller_url }}"
      UP_UNIFI_DEFAULT_USER: "{{ lookup('env', 'UNIFI_RO_USERNAME') }}"
      UP_UNIFI_DEFAULT_PASS: "{{ lookup('env', 'UNIFI_RO_PASSWORD') }}"
      UP_UNIFI_DEFAULT_SAVE_SITES: "true"
      UP_UNIFI_DEFAULT_SAVE_IDS: "true"
      UP_UNIFI_DEFAULT_SAVE_EVENTS: "true"
      UP_UNIFI_DEFAULT_SAVE_ALARMS: "true"
      UP_INFLUXDB_DISABLE: "true"
      UP_PROMETHEUS_HTTP_LISTEN: "0.0.0.0:9130"
  become: true
  when:
    - not ansible_check_mode
    - not (molecule_testing | default(false))
  no_log: true

- name: Verify Pi-hole password is set
  ansible.builtin.assert:
    that:
      - lookup('env', 'PIHOLE_PASSWORD') | length > 0
    fail_msg: "PIHOLE_PASSWORD must be set in Doppler before deploying pihole-exporter."
  when:
    - not (molecule_testing | default(false))

- name: Deploy pihole-exporter container
  community.docker.docker_container:
    name: pihole-exporter
    image: "ekofr/pihole-exporter:{{ pihole_exporter_version }}"
    state: started
    restart_policy: always
    ports:
      - "{{ pihole_exporter_port | string }}:9617"
    env:
      PIHOLE_HOSTNAME: "{{ hostvars['pi-hole.tlesh.xyz']['ansible_host'] }}"
      PIHOLE_PASSWORD: "{{ lookup('env', 'PIHOLE_PASSWORD') }}"
      PIHOLE_PORT: "8080"
  become: true
  when:
    - not ansible_check_mode
    - not (molecule_testing | default(false))
  no_log: true

- name: Download UniFi Poller Grafana dashboard JSONs
  ansible.builtin.get_url:
    url: "https://grafana.com/api/dashboards/{{ item.id }}/revisions/{{ item.rev }}/download"
    dest: "{{ grafana_dashboards_dir }}/{{ item.name }}"
    owner: "472"
    group: "472"
    mode: "0644"
  loop:
    # rev pinned — verify latest at grafana.com/dashboards/<id> before bumping
    - { id: "11310", rev: "5", name: "unifi-poller-sites.json" }
    - { id: "11315", rev: "9", name: "unifi-poller-clients.json" }
  become: true
  notify: Restart Grafana
  when:
    - not (molecule_testing | default(false))
