---
- name: Ensure UNIFI_API_KEY is set
  ansible.builtin.assert:
    that:
      - lookup('env', 'UNIFI_API_KEY') | length > 0
    fail_msg: "UNIFI_API_KEY environment variable must be set (run via doppler run -- or task unifi)"

- name: Fetch all UniFi client records
  ansible.builtin.uri:
    url: "{{ unifi_base_url }}/proxy/network/api/s/{{ unifi_site }}/rest/user"
    method: GET
    headers:
      X-API-KEY: "{{ lookup('env', 'UNIFI_API_KEY') }}"
    validate_certs: "{{ unifi_validate_certs }}"
  register: _unifi_clients

- name: Update DHCP reservation for existing clients
  ansible.builtin.uri:
    url: "{{ unifi_base_url }}/proxy/network/api/s/{{ unifi_site }}/rest/user/{{ _existing._id }}"
    method: PUT
    headers:
      X-API-KEY: "{{ lookup('env', 'UNIFI_API_KEY') }}"
    body_format: json
    body:
      use_fixedip: true
      fixed_ip: "{{ item.ip }}"
      name: "{{ item.name }}"
    validate_certs: "{{ unifi_validate_certs }}"
    status_code: 200
  vars:
    _existing: >-
      {{ _unifi_clients.json.data |
         selectattr('mac', 'equalto', item.mac | lower) |
         list | first | default({}) }}
  when:
    - not ansible_check_mode
    - _existing | length > 0
    - not (_existing.use_fixedip | default(false) | bool) or (_existing.fixed_ip | default('')) != item.ip
  changed_when: true
  loop: "{{ unifi_dhcp_reservations }}"
  loop_control:
    label: "{{ item.name }} ({{ item.mac }} → {{ item.ip }})"

- name: Create DHCP reservation for new clients
  ansible.builtin.uri:
    url: "{{ unifi_base_url }}/proxy/network/api/s/{{ unifi_site }}/rest/user"
    method: POST
    headers:
      X-API-KEY: "{{ lookup('env', 'UNIFI_API_KEY') }}"
    body_format: json
    body:
      mac: "{{ item.mac | lower }}"
      use_fixedip: true
      fixed_ip: "{{ item.ip }}"
      name: "{{ item.name }}"
    validate_certs: "{{ unifi_validate_certs }}"
    status_code: 200
  vars:
    _existing: >-
      {{ _unifi_clients.json.data |
         selectattr('mac', 'equalto', item.mac | lower) |
         list | first | default({}) }}
  when:
    - not ansible_check_mode
    - _existing | length == 0
  changed_when: true
  loop: "{{ unifi_dhcp_reservations }}"
  loop_control:
    label: "{{ item.name }} ({{ item.mac }} → {{ item.ip }})"
