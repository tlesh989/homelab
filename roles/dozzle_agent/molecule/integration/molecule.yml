---
# Integration scenario: deploys Dozzle agent container. Requires Docker socket.
# Run manually: task molecule-integration -- ROLE=dozzle_agent
role_name_check: 1
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: instance
    image: geerlingguy/docker-ubuntu2604-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /var/run/docker.sock:/var/run/docker.sock
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      roles_path: ${MOLECULE_PROJECT_DIRECTORY}/../
  inventory:
    group_vars:
      all:
        dozzle_version: "v10.5.2"
        dozzle_agent_port: 7007
verifier:
  name: ansible
