---
- name: Install dependencies
  ansible.builtin.package:
    name:
      - unzip
      - ufw
      - libcurl4
      - libssl3
      - libatomic1
    state: present
  become: true

- name: Create minecraft system user
  ansible.builtin.user:
    name: minecraft
    system: true
    shell: /usr/sbin/nologin
    home: "{{ minecraft_install_dir }}"
    create_home: false
  become: true

- name: Create install directory
  ansible.builtin.file:
    path: "{{ minecraft_install_dir }}"
    state: directory
    owner: minecraft
    group: minecraft
    mode: "0755"
  become: true

- name: Download BDS archive
  ansible.builtin.get_url:
    url: "{{ minecraft_bds_download_url }}"
    dest: "/tmp/bedrock-server-{{ minecraft_bds_version }}.zip"
    mode: "0644"
  become: true

- name: Extract BDS archive
  ansible.builtin.unarchive:
    src: "/tmp/bedrock-server-{{ minecraft_bds_version }}.zip"
    dest: "{{ minecraft_install_dir }}"
    remote_src: true
    owner: minecraft
    group: minecraft
  become: true
  notify: restart minecraft

- name: Configure server.properties
  ansible.builtin.template:
    src: server.properties.j2
    dest: "{{ minecraft_install_dir }}/server.properties"
    owner: minecraft
    group: minecraft
    mode: "0644"
  become: true
  notify: restart minecraft

- name: Install systemd unit
  ansible.builtin.template:
    src: minecraft.service.j2
    dest: /etc/systemd/system/minecraft.service
    mode: "0644"
  become: true
  notify:
    - reload systemd
    - restart minecraft

- name: Enable and start minecraft service
  ansible.builtin.service:
    name: minecraft
    state: started
    enabled: true
  become: true

- name: Allow Minecraft UDP port in UFW
  ansible.builtin.command:
    cmd: "ufw allow {{ minecraft_port }}/udp"
  become: true
  register: _ufw_result
  changed_when: "'Rules updated' in _ufw_result.stdout"
