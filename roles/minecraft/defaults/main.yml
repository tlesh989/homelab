---
minecraft_bds_version: "1.26.14.1"
minecraft_bds_download_url: "https://www.minecraft.net/bedrockdedicatedserver/bin-linux/bedrock-server-{{ minecraft_bds_version }}.zip"
minecraft_install_dir: /opt/minecraft/bedrock
minecraft_port: 19132
minecraft_server_name: "Cat's Cafe 2.0"
minecraft_level_name: "Death Valley"
minecraft_level_seed: "1370927827048225416"
minecraft_max_players: 10
minecraft_online_mode: true
minecraft_difficulty: easy
minecraft_gamemode: survival
minecraft_update_weekday: "0"
minecraft_update_hour: "3"
minecraft_update_minute: "0"
# Sourced from MINECRAFT_OPERATOR_XUID env var (injected via Doppler) or
# overridden in group_vars/host_vars. An empty XUID would produce a broken
# permissions.json, so tasks/main.yml asserts this is non-null/non-empty.
minecraft_operator_xuid: "{{ lookup('env', 'MINECRAFT_OPERATOR_XUID') | default(None, true) }}"
