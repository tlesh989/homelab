---
# tasks file for r8152 — Realtek out-of-tree DKMS driver for RTL8156-based USB NICs

- name: Check for RTL8156 USB NIC
  ansible.builtin.shell:
    cmd: set -o pipefail && lsusb | grep -i "{{ r8152_usb_vendor }}:{{ r8152_usb_product }}"
    executable: /bin/bash
  register: r8152_usb_check
  failed_when: false
  changed_when: false

- name: Install and configure r8152 DKMS driver
  when: r8152_usb_check.rc == 0
  block:
    - name: Check if realtek-r8152-dkms is already installed
      ansible.builtin.shell:
        cmd: set -o pipefail && dpkg -l realtek-r8152-dkms 2>/dev/null | grep -E '^ii'
        executable: /bin/bash
      register: r8152_dpkg_check
      failed_when: false
      changed_when: false

    - name: Get list of installed Proxmox kernel versions
      ansible.builtin.shell:
        cmd: set -o pipefail && dpkg -l 'pve-kernel-*' 2>/dev/null | awk '/^ii/ {print $2}' | sed 's/pve-kernel-//'
        executable: /bin/bash
      register: _r8152_installed_kernels
      changed_when: false
      failed_when: false

    - name: Install headers for all installed Proxmox kernels
      ansible.builtin.apt:
        name: "proxmox-headers-{{ item }}"
        state: present
        update_cache: false
      loop: "{{ _r8152_installed_kernels.stdout_lines }}"
      failed_when: false

    - name: Install DKMS build toolchain
      ansible.builtin.apt:
        name:
          - dkms
          - build-essential
        state: present
        update_cache: false

    - name: Resolve realtek-r8152-dkms .deb download URL
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          if [ "{{ r8152_deb_version }}" = "latest" ]; then
            curl -sfL https://api.github.com/repos/awesometic/realtek-r8152-dkms/releases/latest \
              | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          url = next(a['browser_download_url'] for a in data['assets'] if '{{ r8152_deb_arch }}.deb' in a['name'])
          print(url)
          "
          else
            BASE="https://github.com/awesometic/realtek-r8152-dkms/releases/download"
            VER="{{ r8152_deb_version }}"
            echo "${BASE}/${VER}/realtek-r8152-dkms_${VER}_{{ r8152_deb_arch }}.deb"
          fi
        executable: /bin/bash
      register: _r8152_deb_url_result
      changed_when: false
      when: r8152_dpkg_check.rc != 0

    - name: Set .deb download URL fact
      ansible.builtin.set_fact:
        _r8152_deb_url: "{{ _r8152_deb_url_result.stdout | trim }}"
      when: r8152_dpkg_check.rc != 0

    - name: Download realtek-r8152-dkms .deb package
      ansible.builtin.get_url:
        url: "{{ _r8152_deb_url }}"
        dest: /tmp/realtek-r8152-dkms.deb
        mode: "0644"
      when: r8152_dpkg_check.rc != 0

    - name: Install realtek-r8152-dkms .deb package
      ansible.builtin.apt:
        deb: /tmp/realtek-r8152-dkms.deb
        state: present
      when: r8152_dpkg_check.rc != 0

    - name: Build DKMS module for all kernels with available headers
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          VER=$(dkms status | grep realtek-r8152 | awk -F'[/, ]' '{print $2}' | head -1)
          [ -z "$VER" ] && exit 0
          for kver in $(ls /lib/modules); do
            [ -d "/lib/modules/$kver/build" ] || continue
            dkms status "realtek-r8152/$VER" -k "$kver" 2>/dev/null | grep -q installed && continue
            dkms build "realtek-r8152/$VER" -k "$kver" 2>/dev/null || true
            dkms install "realtek-r8152/$VER" -k "$kver" 2>/dev/null || true
          done
        executable: /bin/bash
      when: r8152_dpkg_check.rc != 0
      changed_when: true

    - name: Remove conflicting manual udev rule
      ansible.builtin.file:
        path: /etc/udev/rules.d/50-r8152-rtl8156.rules
        state: absent
      notify: Reload udev rules

    - name: Blacklist competing USB NIC drivers
      ansible.builtin.copy:
        dest: /etc/modprobe.d/99-rtl815x-usb-blacklist.conf
        mode: "0644"
        content: |
          # Prevent generic/alternate drivers from binding RTL815x USB NICs
          blacklist cdc_ncm
          blacklist cdc_ether
          blacklist r8153_ecm
          # Block explicit module loading attempts
          install cdc_ncm /bin/false
          install cdc_ether /bin/false
          install r8153_ecm /bin/false
      notify: Update initramfs

    - name: Set USB device to r8152 configuration mode (config 1)
      ansible.builtin.shell:
        cmd: |
          for dev in /sys/bus/usb/devices/*; do
            vid=$(cat "$dev/idVendor" 2>/dev/null || true)
            pid=$(cat "$dev/idProduct" 2>/dev/null || true)
            [ "$vid" = "{{ r8152_usb_vendor }}" ] && [ "$pid" = "{{ r8152_usb_product }}" ] || continue
            current=$(cat "$dev/bConfigurationValue" 2>/dev/null || echo "0")
            [ "$current" = "1" ] && continue
            echo 1 > "$dev/bConfigurationValue" || true
          done
        executable: /bin/bash
      failed_when: false
      changed_when: false

    - name: Bind RTL8156 USB NIC to r8152 driver at runtime
      ansible.builtin.shell:
        cmd: echo "{{ r8152_usb_vendor }} {{ r8152_usb_product }}" > /sys/bus/usb/drivers/r8152/new_id
        executable: /bin/bash
      failed_when: false
      changed_when: false
