---
# defaults file for truenas

# TrueNAS host (hostname or IP — accessible from Ansible controller)
truenas_host: "192.168.233.6"
# TrueNAS API key — injected from Doppler as TRUENAS_API_KEY
truenas_api_key: "{{ lookup('env', 'TRUENAS_API_KEY') }}"

# iSCSI configuration
truenas_iscsi_portal_ip: "192.168.220.6"
truenas_iscsi_portal_comment: "proxmox"

truenas_iscsi_target_name: "proxmox"
# Full IQN: iqn.2005-10.org.freenas.ctl:proxmox

truenas_iscsi_extent_name: "proxmox-iscsi"
truenas_iscsi_extent_disk: "zvol/wayreth/proxmox-iscsi"
truenas_iscsi_extent_blocksize: 512
truenas_iscsi_extent_comment: "proxmox shared storage"

# LVM configuration
# Node that creates the VG (other nodes discover it via shared LVM metadata)
truenas_lvm_primary_node: "sturm"
truenas_lvm_vg_name: "pve-iscsi"

# TLS verification — set to false for self-signed certs
truenas_validate_certs: false

# Beszel agent — deployed as a custom TrueNAS SCALE app (see beszel_agent.yml)
# Mirrors roles/beszel/defaults/main.yml (the truenas role's play doesn't load
# that role's defaults, since it never runs the beszel role directly)
truenas_beszel_app_name: "beszel-agent"
truenas_beszel_hub_hostname: "kaz.tlesh.xyz"
truenas_beszel_hub_port: 8090
truenas_beszel_agent_port: 45876

# iSCSI CHAP authentication (homelab-1it).
# DANGER: enabling CHAP on a target that backs live Proxmox VM disks (pve-iscsi
# LVM) will break those disks unless the Proxmox initiators are configured with
# the same credentials FIRST and the sessions re-login. Default OFF — flip to
# true only during a supervised maintenance window. See runbook in iscsi_chap.yml.
truenas_iscsi_chap_enabled: false
truenas_iscsi_chap_tag: 1
truenas_iscsi_chap_user: "{{ lookup('env', 'TRUENAS_ISCSI_CHAP_USER') | default('', true) }}"
truenas_iscsi_chap_secret: "{{ lookup('env', 'TRUENAS_ISCSI_CHAP_SECRET') | default('', true) }}"
