---
# tasks file for truenas — NFS share management

- name: Create media dataset
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/pool/dataset"
    method: POST
    headers:
      Authorization: "Bearer {{ truenas_api_key }}"
    body_format: json
    body:
      name: "{{ item.dataset }}"
      type: "FILESYSTEM"
      comments: "{{ item.comment }}"
    status_code: [200, 422]
    validate_certs: "{{ truenas_validate_certs }}"
  loop: "{{ truenas_nfs_shares }}"
  loop_control:
    label: "{{ item.dataset }}"
  no_log: true

- name: Create NFS share
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/sharing/nfs"
    method: POST
    headers:
      Authorization: "Bearer {{ truenas_api_key }}"
    body_format: json
    body:
      path: "/mnt/{{ item.dataset }}"
      comment: "{{ item.comment }}"
      hosts: "{{ item.hosts }}"
      maproot_user: "{{ item.maproot_user }}"
      maproot_group: "{{ item.maproot_group }}"
      enabled: true
    status_code: [200, 422]
    validate_certs: "{{ truenas_validate_certs }}"
  loop: "{{ truenas_nfs_shares }}"
  loop_control:
    label: "{{ item.dataset }}"
  no_log: true

- name: Ensure NFS service is running
  ansible.builtin.uri:
    url: "{{ truenas_api_url }}/service/start"
    method: POST
    headers:
      Authorization: "Bearer {{ truenas_api_key }}"
    body_format: json
    body:
      service: "nfs"
    status_code: [200]
    validate_certs: "{{ truenas_validate_certs }}"
  no_log: true
