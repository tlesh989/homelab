---
# tasks file for truenas — iSCSI portal, target, extent, and service

# ── Portal ──────────────────────────────────────────────────────────────────

- name: Get existing iSCSI portals
  truenas_api:
    host: "{{ truenas_host }}"
    api_key: "{{ truenas_api_key }}"
    method: iscsi.portal.query
    validate_certs: "{{ truenas_validate_certs }}"
  register: _truenas_portals
  changed_when: false
  no_log: true

- name: Create iSCSI portal
  truenas_api:
    host: "{{ truenas_host }}"
    api_key: "{{ truenas_api_key }}"
    method: iscsi.portal.create
    params:
      - listen:
          - ip: "{{ truenas_iscsi_portal_ip }}"
        comment: "{{ truenas_iscsi_portal_comment }}"
    validate_certs: "{{ truenas_validate_certs }}"
  register: _truenas_portal_create
  when: >-
    _truenas_portals.result
    | selectattr('comment', 'equalto', truenas_iscsi_portal_comment)
    | list | length == 0
  changed_when: true
  no_log: true

- name: Set portal ID fact
  ansible.builtin.set_fact:
    _truenas_portal_id: >-
      {{
        (_truenas_portals.result
        | selectattr('comment', 'equalto', truenas_iscsi_portal_comment)
        | list | first).id
        if (_truenas_portals.result
            | selectattr('comment', 'equalto', truenas_iscsi_portal_comment)
            | list | length > 0)
        else _truenas_portal_create.result.id
      }}

# ── Target ───────────────────────────────────────────────────────────────────

- name: Get existing iSCSI targets
  truenas_api:
    host: "{{ truenas_host }}"
    api_key: "{{ truenas_api_key }}"
    method: iscsi.target.query
    validate_certs: "{{ truenas_validate_certs }}"
  register: _truenas_targets
  changed_when: false
  no_log: true

- name: Create iSCSI target
  truenas_api:
    host: "{{ truenas_host }}"
    api_key: "{{ truenas_api_key }}"
    method: iscsi.target.create
    params:
      - name: "{{ truenas_iscsi_target_name }}"
        alias: "{{ truenas_iscsi_target_name }}"
        mode: "ISCSI"
    validate_certs: "{{ truenas_validate_certs }}"
  register: _truenas_target_create
  when: >-
    _truenas_targets.result
    | selectattr('name', 'equalto', truenas_iscsi_target_name)
    | list | length == 0
  changed_when: true
  no_log: true

- name: Set target ID fact
  ansible.builtin.set_fact:
    _truenas_target_id: >-
      {{
        (_truenas_targets.result
        | selectattr('name', 'equalto', truenas_iscsi_target_name)
        | list | first).id
        if (_truenas_targets.result
            | selectattr('name', 'equalto', truenas_iscsi_target_name)
            | list | length > 0)
        else _truenas_target_create.result.id
      }}

# ── Target → Portal group association ────────────────────────────────────────
# TrueNAS SCALE 25.x: /iscsi/targetgroup is gone — groups are embedded in the
# target object via iscsi.target.update.

- name: Get iSCSI target details
  truenas_api:
    host: "{{ truenas_host }}"
    api_key: "{{ truenas_api_key }}"
    method: iscsi.target.query
    params:
      - - - id
          - "="
          - "{{ _truenas_target_id | int }}"
    validate_certs: "{{ truenas_validate_certs }}"
  register: _truenas_target_detail
  changed_when: false
  no_log: true

- name: Associate target with portal via groups
  truenas_api:
    host: "{{ truenas_host }}"
    api_key: "{{ truenas_api_key }}"
    method: iscsi.target.update
    params:
      - "{{ _truenas_target_id | int }}"
      - groups: >-
          {{
            ((_truenas_target_detail.result | default([]) | first | default({})).groups | default([]))
            + [{'portal': (_truenas_portal_id | int), 'initiator': none, 'auth': none, 'authmethod': 'NONE'}]
          }}
    validate_certs: "{{ truenas_validate_certs }}"
  when: >-
    (_truenas_target_detail.result | default([]) | first | default({}) ).groups | default([])
    | selectattr('portal', 'equalto', _truenas_portal_id | int)
    | list | length == 0
  changed_when: true
  no_log: true

# ── Extent ───────────────────────────────────────────────────────────────────

- name: Get existing iSCSI extents
  truenas_api:
    host: "{{ truenas_host }}"
    api_key: "{{ truenas_api_key }}"
    method: iscsi.extent.query
    validate_certs: "{{ truenas_validate_certs }}"
  register: _truenas_extents
  changed_when: false
  no_log: true

- name: Create iSCSI extent
  truenas_api:
    host: "{{ truenas_host }}"
    api_key: "{{ truenas_api_key }}"
    method: iscsi.extent.create
    params:
      - name: "{{ truenas_iscsi_extent_name }}"
        type: "DISK"
        disk: "{{ truenas_iscsi_extent_disk }}"
        blocksize: "{{ truenas_iscsi_extent_blocksize | int }}"
        comment: "{{ truenas_iscsi_extent_comment }}"
    validate_certs: "{{ truenas_validate_certs }}"
  register: _truenas_extent_create
  when: >-
    _truenas_extents.result
    | selectattr('name', 'equalto', truenas_iscsi_extent_name)
    | list | length == 0
  changed_when: true
  no_log: true

- name: Set extent ID fact
  ansible.builtin.set_fact:
    _truenas_extent_id: >-
      {{
        (_truenas_extents.result
        | selectattr('name', 'equalto', truenas_iscsi_extent_name)
        | list | first).id
        if (_truenas_extents.result
            | selectattr('name', 'equalto', truenas_iscsi_extent_name)
            | list | length > 0)
        else _truenas_extent_create.result.id
      }}

# ── Target ↔ Extent association ───────────────────────────────────────────────

- name: Get existing iSCSI target-extent associations
  truenas_api:
    host: "{{ truenas_host }}"
    api_key: "{{ truenas_api_key }}"
    method: iscsi.targetextent.query
    validate_certs: "{{ truenas_validate_certs }}"
  register: _truenas_targetextents
  changed_when: false
  no_log: true

- name: Associate target with extent (LUN 0)
  truenas_api:
    host: "{{ truenas_host }}"
    api_key: "{{ truenas_api_key }}"
    method: iscsi.targetextent.create
    params:
      - target: "{{ _truenas_target_id | int }}"
        extent: "{{ _truenas_extent_id | int }}"
        lunid: 0
    validate_certs: "{{ truenas_validate_certs }}"
  when: >-
    _truenas_targetextents.result
    | selectattr('target', 'equalto', _truenas_target_id | int)
    | selectattr('extent', 'equalto', _truenas_extent_id | int)
    | list | length == 0
  changed_when: true
  no_log: true

# ── iSCSI Service ─────────────────────────────────────────────────────────────

- name: Get iSCSI service state
  truenas_api:
    host: "{{ truenas_host }}"
    api_key: "{{ truenas_api_key }}"
    method: service.query
    validate_certs: "{{ truenas_validate_certs }}"
  register: _truenas_services
  changed_when: false
  no_log: true

- name: Assert iSCSI service entry exists in TrueNAS
  ansible.builtin.assert:
    that:
      - _truenas_services.result | selectattr('service', 'equalto', 'iscsitarget') | list | length > 0
    fail_msg: "'iscsitarget' service not found in TrueNAS service list — check TrueNAS version/config"

- name: Enable iSCSI service at boot
  truenas_api:
    host: "{{ truenas_host }}"
    api_key: "{{ truenas_api_key }}"
    method: service.update
    params:
      - "iscsitarget"
      - enable: true
    validate_certs: "{{ truenas_validate_certs }}"
  when: >-
    not (_truenas_services.result
    | selectattr('service', 'equalto', 'iscsitarget')
    | list | first).enable
  changed_when: true
  no_log: true

- name: Start iSCSI service if not running
  truenas_api:
    host: "{{ truenas_host }}"
    api_key: "{{ truenas_api_key }}"
    method: service.start
    params:
      - "iscsitarget"
    validate_certs: "{{ truenas_validate_certs }}"
  when: >-
    (_truenas_services.result
    | selectattr('service', 'equalto', 'iscsitarget')
    | list | first).state != "RUNNING"
  changed_when: true
  no_log: true
