---
# tasks file for truenas

- name: Configure TrueNAS iSCSI
  ansible.builtin.include_tasks: iscsi.yml

- name: Create LVM VG on iSCSI LUN
  ansible.builtin.include_tasks: iscsi_lvm.yml

- name: Configure NFS shares
  ansible.builtin.include_tasks: nfs.yml

- name: Configure periodic ZFS snapshots
  ansible.builtin.include_tasks: snapshots.yml

- name: Configure ZFS scrub schedule
  ansible.builtin.include_tasks: scrub.yml

- name: Deploy Beszel agent as a custom app
  ansible.builtin.include_tasks: beszel_agent.yml
  when:
    - lookup('env', 'BESZEL_KEY') | length > 0
    - lookup('env', 'BESZEL_TOKEN') | length > 0
