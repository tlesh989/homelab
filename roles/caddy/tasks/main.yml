---
- name: Create caddy system group
  ansible.builtin.group:
    name: caddy
    system: true

- name: Create caddy system user
  ansible.builtin.user:
    name: caddy
    group: caddy
    system: true
    shell: /usr/sbin/nologin
    home: "{{ caddy_data_dir }}"
    create_home: false

- name: Create Caddy directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: caddy
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ caddy_install_dir }}", owner: root, mode: "0750" }
    - { path: "{{ caddy_data_dir }}", owner: caddy, mode: "0750" }
    - { path: "{{ caddy_log_dir }}", owner: caddy, mode: "0750" }

- name: Check if Caddy is installed
  ansible.builtin.stat:
    path: /usr/local/bin/caddy
  register: _caddy_binary

- name: Download Caddy with Cloudflare DNS plugin
  ansible.builtin.get_url:
    url: "{{ caddy_download_url }}"
    dest: /usr/local/bin/caddy
    mode: "0755"
    owner: root
    group: root
  when: not _caddy_binary.stat.exists
  notify: Restart caddy

- name: Template Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ caddy_install_dir }}/Caddyfile"
    owner: root
    group: caddy
    mode: "0640"
  notify: Restart caddy

- name: Template Caddy systemd service
  ansible.builtin.template:
    src: caddy.service.j2
    dest: /etc/systemd/system/caddy.service
    mode: "0644"
  notify: Restart caddy

- name: Enable and start Caddy
  ansible.builtin.systemd:
    name: caddy
    state: started
    enabled: true
    daemon_reload: true
