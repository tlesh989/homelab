---
- name: Create caddy system group
  ansible.builtin.group:
    name: caddy
    system: true

- name: Create caddy system user
  ansible.builtin.user:
    name: caddy
    group: caddy
    system: true
    shell: /usr/sbin/nologin
    home: "{{ caddy_data_dir }}"
    create_home: false

- name: Create Caddy directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: caddy
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ caddy_install_dir }}", owner: root, mode: "0750" }
    - { path: "{{ caddy_data_dir }}", owner: caddy, mode: "0750" }
    - { path: "{{ caddy_log_dir }}", owner: caddy, mode: "0750" }

- name: Create acme-deploy group
  ansible.builtin.group:
    name: "{{ caddy_deploy_user }}"
    system: true

- name: Create acme-deploy system user (receives cert push from pi-hole)
  ansible.builtin.user:
    name: "{{ caddy_deploy_user }}"
    group: "{{ caddy_deploy_user }}"
    groups: caddy
    append: true
    system: true
    shell: /bin/bash
    home: "/home/{{ caddy_deploy_user }}"
    create_home: true

- name: Create Caddy TLS directory (setgid so pushed certs inherit caddy group)
  ansible.builtin.file:
    path: "{{ caddy_tls_dir }}"
    state: directory
    owner: "{{ caddy_deploy_user }}"
    group: caddy
    mode: "2750"

- name: Allow acme-deploy to reload caddy without a password
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ caddy_deploy_user }}"
    content: "{{ caddy_deploy_user }} ALL=(root) NOPASSWD: /usr/bin/systemctl reload caddy\n"
    mode: "0440"
    validate: "visudo -cf %s"

- name: Check if Caddy is installed
  ansible.builtin.stat:
    path: /usr/local/bin/caddy
  register: _caddy_binary

- name: Download Caddy with Cloudflare DNS plugin
  ansible.builtin.get_url:
    url: "{{ caddy_download_url }}"
    dest: /usr/local/bin/caddy
    mode: "0755"
    owner: root
    group: root
  when: not _caddy_binary.stat.exists
  notify: Restart caddy

- name: Template Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ caddy_install_dir }}/Caddyfile"
    owner: root
    group: caddy
    mode: "0640"
  notify: Restart caddy

- name: Template Caddy systemd service
  ansible.builtin.template:
    src: caddy.service.j2
    dest: /etc/systemd/system/caddy.service
    mode: "0644"
  notify: Restart caddy

- name: Enable and start Caddy
  ansible.builtin.systemd:
    name: caddy
    state: started
    enabled: true
    daemon_reload: true
