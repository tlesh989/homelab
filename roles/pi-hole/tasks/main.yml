---
# tasks file for pi-hole

- name: Assert PIHOLE_ADMIN_PASSWORD is set
  ansible.builtin.assert:
    that: pihole_admin_password | length > 0
    fail_msg: "PIHOLE_ADMIN_PASSWORD must be set in Doppler — cannot run with empty password"

- name: Install dependencies
  ansible.builtin.apt:
    name:
      - curl
      - git
      - ca-certificates
    state: present
    update_cache: true

- name: Check if pi-hole is installed
  ansible.builtin.stat:
    path: /usr/local/bin/pihole
  register: _pihole_installed

- name: Create pi-hole config directory
  ansible.builtin.file:
    path: "{{ pihole_install_dir }}"
    state: directory
    mode: "0755"
  when: not _pihole_installed.stat.exists

- name: Template unattended install config
  ansible.builtin.template:
    src: setupVars.conf.j2
    dest: "{{ pihole_install_dir }}/setupVars.conf"
    mode: "0644"
  when: not _pihole_installed.stat.exists

- name: Download pi-hole installer
  ansible.builtin.get_url:
    url: "https://install.pi-hole.net"
    dest: /tmp/pihole-install.sh
    mode: "0755"
  when: not _pihole_installed.stat.exists

- name: Run pi-hole unattended install
  ansible.builtin.command:
    cmd: bash /tmp/pihole-install.sh --unattended
  environment:
    PIHOLE_SKIP_OS_CHECK: "true"
  when: not _pihole_installed.stat.exists
  changed_when: true
  notify: Restart pihole-FTL

- name: Set pi-hole admin password
  ansible.builtin.command:
    cmd: pihole setpassword "{{ pihole_admin_password }}"
  no_log: true
  changed_when: true
  when: not _pihole_installed.stat.exists

- name: Ensure setupVars.conf is up to date
  ansible.builtin.template:
    src: setupVars.conf.j2
    dest: "{{ pihole_install_dir }}/setupVars.conf"
    mode: "0644"
  notify: Restart pihole-FTL

- name: Ensure pihole-FTL is enabled and running
  ansible.builtin.service:
    name: pihole-FTL
    enabled: true
    state: started

- name: Create certificate directory for acme deploy hook
  ansible.builtin.file:
    path: "{{ pihole_cert_dir }}"
    state: directory
    mode: "0755"

- name: Read current webserver domain
  ansible.builtin.command:
    cmd: pihole-FTL --config webserver.domain
  register: _current_webserver_domain
  changed_when: false

- name: Configure webserver domain
  ansible.builtin.command:
    cmd: pihole-FTL --config webserver.domain "{{ pihole_domain }}"
  changed_when: _current_webserver_domain.stdout != pihole_domain
  notify: Restart pihole-FTL

- name: Configure webserver TLS certificate
  ansible.builtin.command:
    cmd: pihole-FTL --config webserver.tls.cert "{{ pihole_cert_dir }}/combined.pem"
  changed_when: true
  notify: Restart pihole-FTL

- name: Add sudo rule for ansible user to refresh certificates
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/92-pihole-cert-refresh
    line: "{{ ansible_user }} ALL=(ALL) NOPASSWD: /usr/local/bin/pihole-FTL --config webserver.domain*, /usr/local/bin/pihole-FTL --config webserver.tls.cert*, /bin/systemctl restart pihole-FTL"
    create: true
    mode: "0440"
  when: ansible_user is defined and ansible_user != "root"

- name: Read current upstream DNS servers
  ansible.builtin.command:
    cmd: pihole-FTL --config dns.upstreams
  register: _current_upstreams
  changed_when: false

- name: Configure upstream DNS servers
  ansible.builtin.command:
    cmd: >
      pihole-FTL --config dns.upstreams
      '{{ pihole_upstreams | to_json }}'
  changed_when: >
    (_current_upstreams.stdout | regex_replace('[ "]', ''))
    != (pihole_upstreams | to_json | regex_replace('[ "]', ''))
  notify: Reload pihole-FTL DNS

- name: Read current local DNS hosts
  ansible.builtin.command:
    cmd: pihole-FTL --config dns.hosts
  register: _current_hosts
  changed_when: false

- name: Configure local DNS hosts
  ansible.builtin.command:
    cmd: >
      pihole-FTL --config dns.hosts
      '{{ pihole_local_hosts | to_json }}'
  changed_when: >
    (_current_hosts.stdout | regex_replace('[ "]', ''))
    != (pihole_local_hosts | to_json | regex_replace('[ "]', ''))
  notify: Reload pihole-FTL DNS

- name: Remove legacy custom.list (superseded by pihole.toml dns.hosts)
  ansible.builtin.file:
    path: /etc/pihole/custom.list
    state: absent
  notify: Reload pihole-FTL DNS

- name: Schedule weekly auto-update
  ansible.builtin.cron:
    name: pi-hole auto-update
    minute: "0"
    hour: "3"
    weekday: "0"
    job: /usr/local/bin/pihole -up >> /var/log/pihole-update.log 2>&1
    user: root
