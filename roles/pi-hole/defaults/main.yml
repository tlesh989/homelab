---
# defaults file for pi-hole

# Upstream DNS resolvers — nextdns CLI on gateway handles per-MAC profile routing
pihole_upstreams:
  - "192.168.233.1"

# Admin web interface password — pulled from Doppler
pihole_admin_password: "{{ lookup('env', 'PIHOLE_ADMIN_PASSWORD') }}"

# Pi-hole install dir
pihole_install_dir: /etc/pihole

# Webserver port — HTTP only, TLS terminated by Caddy reverse proxy
# FTL port format: <port>o (o = open/HTTP), e.g. "8080o" for HTTP-only on 8080
pihole_port: "8080o"

# Local DNS A records for homelab services (tlesh.xyz LAN domain)
# Services proxied through Caddy (.25) resolve to Caddy IP, not their own IP
pihole_local_hosts:
  - "192.168.233.3 pi-hole.tlesh.xyz"
  - "192.168.233.7 tika.tlesh.xyz"
  - "192.168.233.8 bupu.tlesh.xyz"
  - "192.168.233.9 sturm.tlesh.xyz"
  - "192.168.233.6 ansalon.tlesh.xyz"
  - "192.168.233.11 jetkvm.tlesh.xyz"
  - "192.168.233.12 plex.tlesh.xyz"
  - "192.168.233.21 tailscale.tlesh.xyz"
  - "192.168.233.24 arr.tlesh.xyz"
  - "192.168.233.10 kaz.tlesh.xyz"
  - "192.168.233.125 homeassistant.tlesh.xyz"
  - "192.168.233.17 caddy.tlesh.xyz"
  - "192.168.233.17 pihole.tlesh.xyz"
  - "192.168.233.17 pi-hole.tlesh.xyz"
  - "192.168.233.17 glance.tlesh.xyz"
  - "192.168.233.17 uptime-kuma.tlesh.xyz"
  - "192.168.233.17 grafana.tlesh.xyz"
