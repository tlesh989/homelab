---
# tasks file for plex — installs Plex inside the LXC
# Media is served via NFS from TrueNAS over the storage network (eth1, 192.168.220.x).

- name: Install NFS client
  ansible.builtin.apt:
    name: nfs-common
    state: present
    update_cache: true
  become: true

- name: Create NFS mount point
  ansible.builtin.file:
    path: "{{ plex_media_path }}"
    state: directory
    mode: "0755"
  become: true

- name: Mount TrueNAS NFS media share
  ansible.posix.mount:
    path: "{{ plex_media_path }}"
    src: "{{ plex_nfs_server }}:{{ plex_nfs_export }}"
    fstype: nfs
    opts: defaults,_netdev,noatime
    state: mounted
  become: true

- name: Enable unattended upgrades for Plex apt repo
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/52unattended-upgrades-plex
    content: |
      // Append Plex repo to unattended-upgrades (:: syntax extends the list, does not replace)
      Unattended-Upgrade::Origins-Pattern:: "site=downloads.plex.tv";
    mode: "0644"
  become: true

- name: Install Plex prerequisites
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - ca-certificates
    state: present
    update_cache: true
  become: true

- name: Install Plex Media Server
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      curl -fsSL https://downloads.plex.tv/plex-keys/PlexSign.key | gpg --dearmor \
        -o /etc/apt/trusted.gpg.d/plexmediaserver.gpg
      echo "deb https://downloads.plex.tv/repo/deb public main" \
        > /etc/apt/sources.list.d/plexmediaserver.list
      apt-get update -qq
      apt-get install -y plexmediaserver
    executable: /bin/bash
    creates: "/usr/lib/plexmediaserver/Plex Media Server"
  become: true

- name: Ensure Plex Media Server is enabled and started
  ansible.builtin.systemd:
    name: plexmediaserver
    enabled: true
    state: started
  become: true

# VAAPI hardware transcoding

- name: Install VAAPI drivers in Plex LXC
  ansible.builtin.apt:
    name:
      - vainfo
      - mesa-va-drivers
    state: present
  become: true

- name: Ensure render group exists
  ansible.builtin.group:
    name: render
    state: present
  become: true

- name: Add plex user to render group
  ansible.builtin.user:
    name: plex
    groups: render
    append: true
  become: true
  notify: Restart Plex
