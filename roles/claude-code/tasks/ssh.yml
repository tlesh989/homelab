---
- name: Ensure .ssh directory exists for tommy
  ansible.builtin.file:
    path: /home/tommy/.ssh
    state: directory
    owner: tommy
    group: tommy
    mode: "0700"
  become: true

- name: Assert ANSIBLE_SSH_PRIVATE_KEY is set
  ansible.builtin.assert:
    that: lookup('env', 'ANSIBLE_SSH_PRIVATE_KEY') != ''
    fail_msg: "ANSIBLE_SSH_PRIVATE_KEY is empty — check Doppler secrets"

- name: Write ansible SSH private key
  ansible.builtin.copy:
    content: "{{ lookup('env', 'ANSIBLE_SSH_PRIVATE_KEY') }}"
    dest: /home/tommy/.ssh/ansible_ed25519
    owner: tommy
    group: tommy
    mode: "0600"
  become: true
  no_log: true

- name: Write SSH config for homelab hosts
  ansible.builtin.blockinfile:
    path: /home/tommy/.ssh/config
    create: true
    owner: tommy
    group: tommy
    mode: "0600"
    block: |
      Host *.tlesh.xyz 192.168.233.*
        IdentityFile ~/.ssh/ansible_ed25519
        IdentitiesOnly yes
        StrictHostKeyChecking no
        User ansible
  become: true
