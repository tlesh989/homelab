---
- name: Install curl and gpg
  ansible.builtin.apt:
    name:
      - curl
      - gpg
    state: present
    update_cache: true
  become: true

- name: Download NodeSource GPG key (ASCII-armored)
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /tmp/nodesource-repo.gpg.key
    mode: "0644"
  become: true

- name: Dearmor NodeSource GPG key
  ansible.builtin.command:
    cmd: gpg --dearmor -o /usr/share/keyrings/nodesource.gpg /tmp/nodesource-repo.gpg.key
    creates: /usr/share/keyrings/nodesource.gpg
  become: true
  changed_when: true

- name: Add NodeSource apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main" # nocheck
    state: present
    filename: nodesource
  become: true

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
  become: true

- name: Install Claude Code CLI
  ansible.builtin.command:
    cmd: npm install -g @anthropic-ai/claude-code
    creates: /usr/local/bin/claude
  become: true
  changed_when: true

- name: Add GitHub CLI GPG key
  ansible.builtin.get_url:
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    dest: /usr/share/keyrings/githubcli-archive-keyring.gpg
    mode: "0644"
  become: true

- name: Add GitHub CLI apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" # nocheck
    state: present
    filename: github-cli
  become: true

- name: Add Doppler GPG key
  ansible.builtin.get_url:
    url: https://packages.doppler.com/public/cli/gpg.DE8DF2F2C3EB2B8B.key # nocheck
    dest: /usr/share/keyrings/doppler.gpg
    mode: "0644"
  become: true

- name: Add Doppler apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/doppler.gpg] https://packages.doppler.com/public/cli/deb/debian any-version main" # nocheck
    state: present
    filename: doppler
  become: true

- name: Install gh, git, and doppler
  ansible.builtin.apt:
    name:
      - gh
      - git
      - doppler
    state: present
    update_cache: true
  become: true
