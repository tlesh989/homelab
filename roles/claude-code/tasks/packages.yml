---
- name: Install curl and gpg
  ansible.builtin.apt:
    name:
      - curl
      - gpg
      - python3-debian
    state: present
    update_cache: true
  become: true

- name: Download NodeSource GPG key (ASCII-armored)
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /tmp/nodesource-repo.gpg.key
    mode: "0644"
  become: true

- name: Dearmor NodeSource GPG key
  ansible.builtin.command:
    cmd: gpg --dearmor -o /usr/share/keyrings/nodesource.gpg /tmp/nodesource-repo.gpg.key
    creates: /usr/share/keyrings/nodesource.gpg
  become: true
  changed_when: true

- name: Add NodeSource apt repository
  ansible.builtin.deb822_repository:
    name: nodesource
    types: deb
    uris: https://deb.nodesource.com/node_20.x # nocheck
    suites: nodistro
    components: main
    signed_by: /usr/share/keyrings/nodesource.gpg
    state: present
  become: true

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
  become: true

- name: Install Claude Code CLI
  ansible.builtin.command:
    cmd: npm install -g @anthropic-ai/claude-code
    creates: /usr/local/bin/claude
  become: true
  changed_when: true

- name: Add GitHub CLI GPG key
  ansible.builtin.get_url:
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    dest: /usr/share/keyrings/githubcli-archive-keyring.gpg
    mode: "0644"
  become: true

- name: Add GitHub CLI apt repository
  ansible.builtin.deb822_repository:
    name: github-cli
    types: deb
    uris: https://cli.github.com/packages # nocheck
    suites: stable
    components: main
    architectures: amd64
    signed_by: /usr/share/keyrings/githubcli-archive-keyring.gpg
    state: present
  become: true

- name: Download Doppler GPG key (ASCII-armored)
  ansible.builtin.get_url:
    url: https://packages.doppler.com/public/cli/gpg.DE2A7741A397C129.key # nocheck
    dest: /tmp/doppler.gpg.key
    mode: "0644"
  become: true
  register: doppler_key_download

- name: Dearmor Doppler GPG key
  ansible.builtin.command:
    cmd: gpg --dearmor --yes -o /usr/share/keyrings/doppler-archive-keyring.gpg /tmp/doppler.gpg.key
  become: true
  when: doppler_key_download.changed
  changed_when: doppler_key_download.changed # noqa: no-handler

- name: Add Doppler apt repository
  ansible.builtin.deb822_repository:
    name: doppler
    types: deb
    uris: https://packages.doppler.com/public/cli/deb/debian # nocheck
    suites: any-version
    components: main
    signed_by: /usr/share/keyrings/doppler-archive-keyring.gpg
    state: present
  become: true

- name: Install gh, git, and doppler
  ansible.builtin.apt:
    name:
      - gh
      - git
      - doppler
    state: present
    update_cache: true
  become: true
